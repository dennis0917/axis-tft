  <script type="text/plain" id="appsrc">/*BUNDLE_START*/

/* ===================== 00-prelude.jsx ===================== */
/* ============================================================
   00-prelude — React hooks, utils, constants, data-source adapter
   (concatenated build: shared scope, no import/export)
   ============================================================ */
const { useState, useEffect, useRef, useMemo, useCallback, useContext, createContext, useReducer, useLayoutEffect, Fragment } = React;

/* ---- classnames ---- */
function cx(...a) { return a.filter(Boolean).join(' '); }

/* ---- Korean particle helpers (handle 받침 so names read naturally) ---- */
function _jong(s) { const t = String(s || ''); const c = t.charCodeAt(t.length - 1); return (c >= 0xAC00 && c <= 0xD7A3) ? (c - 0xAC00) % 28 : -1; }
function eul(s) { const j = _jong(s); return s + (j > 0 ? '을' : j === 0 ? '를' : '을'); }   // 을/를
function iga(s) { const j = _jong(s); return s + (j > 0 ? '이' : j === 0 ? '가' : '이'); }   // 이/가
function euro(s) { const j = _jong(s); return s + (j <= 0 || j === 8 ? '로' : '으로'); }      // 으로/로 (ㄹ받침=로)
function eun(s) { const j = _jong(s); return s + (j > 0 ? '은' : j === 0 ? '는' : '은'); }   // 은/는

/* ---- number formatting ---- */
const fmt = {
  place: (n) => (n == null ? '—' : n.toFixed(2)),
  pct: (n, d = 1) => (n == null ? '—' : (n).toFixed(d) + '%'),
  delta: (n) => (n > 0 ? '+' : '') + n.toFixed(2),
  k: (n) => (n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'K' : String(n)),
  int: (n) => (n == null ? '—' : Math.round(n).toLocaleString('en-US')),
};

/* ---- deterministic seeded RNG (stable mock stats across reloads) ---- */
function hashStr(s) {
  let h = 2166136261 >>> 0;
  s = String(s);
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function rng(seed) {
  let a = (typeof seed === 'string' ? hashStr(seed) : seed) >>> 0;
  return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
}
function rand(seed, min, max) { return min + rng(seed)() * (max - min); }
function pick(seed, arr) { return arr[Math.floor(rng(seed)() * arr.length)]; }

/* ---- cost colors ---- */
const COST_COLOR = { 1: 'var(--cost-1)', 2: 'var(--cost-2)', 3: 'var(--cost-3)', 4: 'var(--cost-4)', 5: 'var(--cost-5)' };
const COST_HEX = { 1: '#8d9099', 2: '#1bc47d', 3: '#2f9bff', 4: '#c44dff', 5: '#ffb020' };

/* ---- tier helpers ---- */
const TIER_ORDER = ['S', 'A', 'B', 'C', 'D'];
function tierFromPlacement(avg) {
  if (avg <= 4.2) return 'S';
  if (avg <= 4.45) return 'A';
  if (avg <= 4.65) return 'B';
  if (avg <= 4.85) return 'C';
  return 'D';
}
function tierColor(t) { return `var(--tier-${t.toLowerCase()})`; }

/* trait style → label/color (1 bronze, 3 silver, 5 gold, 6 prismatic) */
const TRAIT_STYLE = { 1: { c: 'var(--cost-1)', n: '브론즈' }, 2: { c: '#cd7f32', n: '브론즈' }, 3: { c: '#c0c0c0', n: '실버' }, 4: { c: '#c0c0c0', n: '실버' }, 5: { c: '#ffd24a', n: '골드' }, 6: { c: '#5ad1ff', n: '프리즘' }, 7: { c: '#5ad1ff', n: '프리즘' } };

/* ---- tiny async hook (mirrors a query layer; swaps cleanly to a real API) ---- */
function useAsync(fn, deps) {
  const [state, setState] = useState({ loading: true, data: null, error: null });
  useEffect(() => {
    let alive = true;
    setState((s) => ({ ...s, loading: true }));
    Promise.resolve().then(fn).then(
      (data) => { if (alive) setState({ loading: false, data, error: null }); },
      (error) => { if (alive) setState({ loading: false, data: null, error }); }
    );
    return () => { alive = false; };
  }, deps || []); // eslint-disable-line
  return state;
}

/* ---- API 호출 헬퍼 ----
   같은 출처(터널 서빙)면 상대경로 + 쿠키 인증, 원격(GitHub Pages → PC 백엔드)이면
   window.AXIS_API_BASE 절대주소 + X-Axis-Key 헤더 인증. 비밀키는 URL ?k= 또는 localStorage('axis_key'). */
const API_BASE = (typeof window !== 'undefined' && window.AXIS_API_BASE) ? String(window.AXIS_API_BASE).replace(/\/+$/, '') : '';
const API_KEY = (function () {
  try {
    const u = new URLSearchParams(location.search).get('k');
    if (u) { try { localStorage.setItem('axis_key', u); } catch (e) {} return u; }
    try { return localStorage.getItem('axis_key') || ''; } catch (e) { return ''; }
  } catch (e) { return ''; }
})();
function apiFetch(path, opts) {
  opts = opts || {};
  const headers = Object.assign({}, opts.headers || {});
  if (API_KEY) headers['X-Axis-Key'] = API_KEY;
  return fetch(API_BASE + path, Object.assign({}, opts, { headers }));
}

/* ---- DataSource adapter (the architecture's hard requirement) ----
   All data access goes through this interface. MockDataSource computes
   everything locally; ApiDataSource (stub) shows where a real backend plugs in. */
const DataSourceContext = createContext(null);
function DataSourceProvider({ source, children }) {
  return React.createElement(DataSourceContext.Provider, { value: source }, children);
}
function useDS() { return useContext(DataSourceContext); }

/* localStorage-backed tiny store for user prefs / saved boards */
const store = {
  get(k, def) { try { const v = localStorage.getItem('axis_' + k); return v ? JSON.parse(v) : def; } catch (e) { return def; } },
  set(k, v) { try { localStorage.setItem('axis_' + k, JSON.stringify(v)); } catch (e) {} },
};


/* ===================== 10-data.jsx ===================== */
/* ============================================================
   10-data — build the in-memory DB from real CDragon data,
   then generate deterministic, believable mock analytics.
   ============================================================ */
const RAW = (typeof window !== 'undefined' && window.TFT_RAW) || { champions: [], traits: [], items: [], components: [], augments: [], emblems: [], set: {} };

/* ---- index maps ---- */
const champByKey = {}, champByName = {};
RAW.champions.forEach((c) => { champByKey[c.key] = c; champByName[c.name] = c; });
const traitByName = {};
RAW.traits.forEach((t) => { traitByName[t.name] = t; });
const itemByName = {};
RAW.items.forEach((i) => { itemByName[i.name] = i; });

/* universal item lookup across every category (base/유물/찬란/동물특공대/초능력/상징/조합)
   — used to resolve researched meta item names to real icons. */
const allItemByName = {};
['items', 'artifacts', 'radiantItems', 'animaItems', 'psyOps', 'emblems', 'components'].forEach((cat) => {
  (RAW[cat] || []).forEach((it) => { if (!allItemByName[it.name]) allItemByName[it.name] = it; });
});
// research → my-data champion name reconciliation (transliteration differences)
const CHAMP_ALIAS = {
  '디아나': '다이애나',
  '그나르': '나르', // Set 17 Gnar 공식명 = 나르
};
// research → my-data name reconciliation (only items confirmed identical;
// uncertain matches are left to render as a name chip rather than mislabeled).
const ITEM_ALIAS = {
  '멀웨어 매트릭스': '악성코드 매트릭스', // Malware Matrix (초능력)
  '헥스테크 건블레이드': '마법공학 총검',  // Hextech Gunblade (공식 KR명)
};
function itemLookup(name) {
  return allItemByName[name] || allItemByName[ITEM_ALIAS[name]] || itemByName[name] || { name, img: null };
}

/* real high-elo stats (window.TFT_REAL_STATS) — replaces placeholder analytics where available */
const REAL_STATS = (typeof window !== 'undefined' && window.TFT_REAL_STATS) || { champions: {}, items: {}, augTiers: {} };

/* momentum (최근 vs 기준 기간 변화). dPick/dPlay=픽률%p, dAvg=평균등수 변화(음수=상승세), dTop4=순방률%p.
   패치 중반엔 거의 0(안정), 패치 직후 자동으로 의미있는 값이 들어온다. */
const TRENDS = (REAL_STATS.trends) || { champions: {}, items: {}, window: { recent: 2, base: 7 } };
function champTrend(name) { return TRENDS.champions[name] || null; }
function itemTrend(name) { return TRENDS.items[name] || null; }
// "의미있는 변동" 임계값 — 이보다 작으면 노이즈로 보고 화살표/리스트에서 숨김
const TREND_MIN_PICK = 0.8; // %p
const TREND_MIN_AVG = 0.12; // 평균등수
function trendSignificant(t) { return !!t && (Math.abs(t.dPick != null ? t.dPick : t.dPlay || 0) >= TREND_MIN_PICK || Math.abs(t.dAvg || 0) >= TREND_MIN_AVG); }
// 종합 모멘텀 점수(상승=양수): 픽률 상승 + 평균등수 개선(음수 dAvg) 가중
function trendScore(t) { if (!t) return 0; const p = t.dPick != null ? t.dPick : (t.dPlay || 0); return p - (t.dAvg || 0) * 6; }

/* per-carry BiS (삼신기) + star targets (researched, window.TFT_BIS) */
const BIS = (typeof window !== 'undefined' && window.TFT_BIS) || {};
function bisFor(name) { return BIS[name] || null; }

/* role → standard best-3 (삼신기) template; every item exists in the 36-item set.
   Used so EVERY champion shows a sensible 삼신기, not just the researched carries. */
const ROLE_BIS = {
  ADCarry: ['무한의 대검', '최후의 속삭임', '거인 학살자'],
  ADCaster: ['죽음의 검', '쇼진의 창', '최후의 속삭임'],
  ADFighter: ['거인 학살자', '최후의 속삭임', '스테락의 도전'],
  ADReaper: ['무한의 대검', '최후의 속삭임', '정의의 손길'],
  ADSpecialist: ['구인수의 격노검', '최후의 속삭임', '거인 학살자'],
  ADTank: ['가고일 돌갑옷', '워모그의 갑옷', '스테락의 도전'],
  APCarry: ['라바돈의 죽음모자', '보석 건틀릿', '공허의 지팡이'],
  APCaster: ['쇼진의 창', '라바돈의 죽음모자', '보석 건틀릿'],
  APFighter: ['보석 건틀릿', '스테락의 도전', '워모그의 갑옷'],
  APReaper: ['라바돈의 죽음모자', '보석 건틀릿', '정의의 손길'],
  APTank: ['가고일 돌갑옷', '워모그의 갑옷', '태양불꽃 망토'],
  HFighter: ['거인 학살자', '스테락의 도전', '최후의 속삭임'],
};
function roleBiSItems(champ) {
  let tpl = ROLE_BIS[champ.role];
  if (!tpl) tpl = isTank(champ) ? ROLE_BIS.APTank : isAP(champ) ? ROLE_BIS.APCaster : ROLE_BIS.ADCarry;
  return tpl.map((n) => itemByName[n] || { name: n, img: null });
}
/* per-champion stats BiS (top-tier most-equipped, all 63 champs) */
const CHAMP_BIS = (typeof window !== 'undefined' && window.TFT_CHAMP_BIS) || {};
/* unified 삼신기: stats-based (상위 3% 최다 장착) first → curated comp BiS → role template */
function synergyBiS(champ) {
  const stat = CHAMP_BIS[champ.name];
  const cur = bisFor(champ.name);
  if (stat && stat.items && stat.items.length) {
    const items = stat.items.map((n) => itemByName[n] || allItemByName[n] || { name: n, img: null });
    return { items, star: cur ? cur.star : null, note: stat.note || (cur && cur.note) || null, source: 'stats', carry: stat.carry, low: stat.low, realBis: stat.realBis };
  }
  if (cur) return { items: cur.items, star: cur.star, note: cur.note, source: 'research' };
  return { items: roleBiSItems(champ), star: null, note: null, source: 'role' };
}
// KR 아이템명 배열 → 아이콘 포함 아이템 객체 배열 (덱 데이터가 직접 제공한 정템 매핑용)
function mapItemNames(names) { return (names || []).map((n) => itemByName[n] || allItemByName[n] || { name: n, img: null }); }

/* ---- classify items by effect keywords (Korean) ---- */
function itemTags(it) {
  const d = (it.desc || '') + ' ' + (it.name || '');
  const tags = [];
  if (/주문력/.test(d)) tags.push('ap');
  if (/공격력/.test(d)) tags.push('ad');
  if (/공격 속도/.test(d)) tags.push('as');
  if (/치명타/.test(d)) tags.push('crit');
  if (/체력|방어력|마법 저항력|보호막|회복/.test(d)) tags.push('tank');
  if (/마나/.test(d)) tags.push('mana');
  if (tags.length === 0) tags.push('util');
  return tags;
}
RAW.items.forEach((i) => { i.tags = itemTags(i); });
const itemsByTag = (tag) => RAW.items.filter((i) => i.tags.includes(tag));

/* role buckets */
// Set 17 role strings are like APTank/APCaster/ADFighter/ADCarry/ADReaper/HFighter.
// Classify by prefix/keyword (the old name-list buckets matched almost nothing).
const isTank = (c) => /Tank|Warden|Brawler/i.test(c.role || '');
const isFront = (c) => /Tank|Warden|Bruiser|Fighter|Brawler/i.test(c.role || '');
const isAP = (c) => /^AP/.test(c.role || '');
const isAD = (c) => /^AD|^H/.test(c.role || '');

/* pick 3 best items for a champion (themed by role), deterministic */
function bestItemsFor(champ, seed) {
  const r = rng(seed + champ.key);
  let pool;
  if (isTank(champ)) pool = [...itemsByTag('tank')];
  else if (isAP(champ)) pool = [...itemsByTag('ap'), ...itemsByTag('mana'), ...itemsByTag('as')];
  else pool = [...itemsByTag('ad'), ...itemsByTag('as'), ...itemsByTag('crit')];
  pool = pool.filter((v, i, a) => a.indexOf(v) === i);
  // stable shuffle
  const out = [];
  const used = new Set();
  let guard = 0;
  while (out.length < 3 && guard++ < 60 && pool.length) {
    const it = pool[Math.floor(r() * pool.length)];
    if (it && !used.has(it.name)) { used.add(it.name); out.push(it); }
  }
  while (out.length < 3 && RAW.items.length) { const it = RAW.items[out.length]; if (it) out.push(it); else break; }
  return out;
}

/* ---- per-champion analytics ---- */
function genChampStats(c) {
  const seed = 'champ' + c.key;
  const real = REAL_STATS.champions && REAL_STATS.champions[c.name];
  const base = 4.2 + (5 - c.cost) * 0.06 + (rng(seed)() - 0.5) * 0.6;
  const avg = real ? real.avg : Math.max(3.7, Math.min(5.4, base));
  const pickRate = real ? real.pick : Math.max(0.6, (rng(seed + 'p')() * (c.cost >= 4 ? 28 : 16)) + (5 - c.cost) * 1.5);
  const top4 = real ? real.top4 : Math.max(38, Math.min(62, 50 + (4.5 - avg) * 22));
  const winRate = Math.max(8, Math.min(24, 14 + (4.5 - avg) * 12));
  // star distribution
  const s1 = c.cost <= 2 ? rand(seed + 's', 30, 50) : rand(seed + 's', 60, 80);
  const s3 = c.cost <= 2 ? rand(seed + 's3', 8, 22) : rand(seed + 's3', 0.4, 4);
  const s2 = 100 - s1 - s3;
  // placement histogram (1..8)
  const hist = [];
  for (let p = 1; p <= 8; p++) { const d = Math.abs(p - avg); hist.push(Math.max(2, 26 - d * d * 2.4 + (rng(seed + 'h' + p)() - 0.5) * 6)); }
  const hs = hist.reduce((a, b) => a + b, 0); const histPct = hist.map((h) => (h / hs) * 100);
  return {
    avg, pickRate, top4, winRate,
    stars: [s1, s2, s3],
    hist: histPct,
    items: bestItemsFor(c, 'it'),
    sample: Math.round(rand(seed + 'n', 8000, 240000)),
  };
}
const CHAMP_STATS = {};
RAW.champions.forEach((c) => { CHAMP_STATS[c.key] = genChampStats(c); });

/* ---- item analytics ---- */
function genItemStats(it) {
  const seed = 'item' + it.name;
  const realI = REAL_STATS.items && REAL_STATS.items[it.name];
  const avg = realI ? realI.avg : Math.max(3.9, Math.min(5.0, 4.5 + (rng(seed)() - 0.5) * 0.7));
  const carriers = RAW.champions.filter((c) => {
    const t = it.tags;
    if (t.includes('tank')) return isFront(c);
    if (t.includes('ap')) return isAP(c);
    if (t.includes('ad') || t.includes('crit')) return isAD(c);
    return c.cost >= 4;
  });
  let best = carriers.filter((c) => c.cost >= 3).sort((a, b) => CHAMP_STATS[a.key].avg - CHAMP_STATS[b.key].avg).slice(0, 5);
  if (best.length === 0) best = RAW.champions.filter((c) => c.cost >= 3).sort((a, b) => CHAMP_STATS[a.key].avg - CHAMP_STATS[b.key].avg).slice(0, 5);
  return { avg, top4: realI ? realI.top4 : Math.max(45, 58 - (avg - 4.3) * 20), winRate: Math.max(10, 20 - (avg - 4.3) * 14), best, pickRate: realI ? (realI.play || rand(seed + 'p', 3, 22)) : rand(seed + 'p', 3, 22) };
}
const ITEM_STATS = {};
RAW.items.forEach((it) => { ITEM_STATS[it.name] = genItemStats(it); });

/* ---- augment analytics ---- */
const AUG_STAGES = ['2-1', '3-2', '4-2'];
// MetaTFT augment tier list → target avg-placement band (Riot bans exact augment win%, so we use tiers)
const AUG_TIER_AVG = { S: 3.95, A: 4.2, B: 4.45, C: 4.7, D: 4.95 };
const _augTierOf = {};
(REAL_STATS.augTiers ? Object.entries(REAL_STATS.augTiers) : []).forEach(([tier, names]) => (names || []).forEach((n) => { _augTierOf[n] = tier; }));
function augTierFor(name) { if (_augTierOf[name]) return _augTierOf[name]; const k = Object.keys(_augTierOf).find((x) => name.includes(x) || x.includes(name)); return k ? _augTierOf[k] : null; }
function genAugStats(a) {
  const seed = 'aug' + a.name;
  const tier = augTierFor(a.name);
  const kindBias = a.kind === '은총' ? -0.12 : a.kind === '특성' ? 0.03 : 0;
  const avg = tier
    ? Math.max(3.85, Math.min(5.1, AUG_TIER_AVG[tier] + (rng(seed)() - 0.5) * 0.18))
    : Math.max(3.9, Math.min(5.1, 4.5 + kindBias + (rng(seed)() - 0.5) * 0.7));
  return {
    avg, top4: Math.max(44, 60 - (avg - 4.2) * 22), first: Math.max(9, 16 - (avg - 4.2) * 9),
    pickRate: rand(seed + 'p', 2, 26), stage: pick(seed + 'st', AUG_STAGES), tier,
    sample: Math.round(rand(seed + 'n', 4000, 90000)),
  };
}
const AUG_STATS = {};
RAW.augments.forEach((a) => { AUG_STATS[a.name] = genAugStats(a); });

/* ---- 신(神) + 가호(은총) (Set 17 우주의 신들) ----
   Full blessing list from research (window.TFT_GODS_CURATED) merged with
   CDragon god emblems + blessing icons (name match). */
function genGodStat(seed) { return { avg: rand(seed + 'a', 3.85, 4.7), pickRate: rand(seed + 'p', 6, 34), top4: Math.round(rand(seed + 't', 49, 66)) }; }
const _cdGods = RAW.gods || [];
const _cdIconByName = {};
_cdGods.forEach((g) => (g.blessings || []).forEach((b) => { if (b.img) _cdIconByName[b.name] = b.img; }));
const _curatedGods = (typeof window !== 'undefined' && window.TFT_GODS_CURATED) || null;
let GODS;
if (_curatedGods && _curatedGods.length) {
  GODS = _curatedGods.map((g) => {
    const key = (g.godEn || g.godKr).replace(/\s+/g, '');
    const cd = _cdGods.find((x) => x.name === g.godKr || (x.key || '').toLowerCase() === key.toLowerCase());
    return { key, name: g.godKr, en: g.godEn, theme: g.theme || '', img: g.img || cd?.img || null, champImg: cd?.champImg || null,
      blessings: (g.blessings || []).map((b) => ({ name: b.name, effect: b.effect || '', tier: b.tier || '', img: b.img || _cdIconByName[b.name] || null })) };
  });
} else {
  GODS = _cdGods.map((g) => ({ key: g.key, name: g.name, en: g.key, theme: '', img: g.img, champImg: g.champImg, blessings: (g.blessings || []).map((b) => ({ name: b.name, effect: b.desc || '', tier: '', img: b.img })) }));
}
const GOD_STATS = {};
GODS.forEach((g) => {
  GOD_STATS[g.key] = genGodStat('god' + g.key);
  g.blessings.forEach((b) => { b.s = genGodStat('bls' + g.key + b.name); });
});

/* ============================================================
   Comp (team composition) generation around trait themes
   ============================================================ */
const PLAYSTYLES = [
  { key: 'fast8', tag: '패스트8', diff: 'normal' },
  { key: 'standard', tag: '정석', diff: 'easy' },
  { key: 'reroll', tag: '리롤', diff: 'hard' },
  { key: 'hyperroll', tag: '1코 리롤', diff: 'normal' },
];

function activeTraits(units) {
  const counts = {};
  units.forEach((u) => (u.traits || []).forEach((t) => { counts[t] = (counts[t] || 0) + 1; }));
  return Object.entries(counts).map(([name, n]) => {
    const t = traitByName[name];
    let active = 0, next = null;
    if (t) for (const bp of t.breakpoints) { if (n >= bp.units) active = bp.units; else { next = bp.units; break; } }
    const style = t ? (t.breakpoints.filter((b) => b.units <= n).slice(-1)[0]?.style || 0) : 0;
    return { name, count: n, active, next, style, img: t?.img, on: active > 0 };
  }).sort((a, b) => (b.on - a.on) || (b.count - a.count));
}

function buildComp(theme, idx) {
  const seed = 'comp' + theme.name + idx;
  const members = RAW.champions.filter((c) => (c.traits || []).includes(theme.name));
  if (members.length < 3) return null;
  // carry = highest cost member (prefer backline)
  const sortedCost = [...members].sort((a, b) => (isFront(a) - isFront(b)) || (b.cost - a.cost));
  const carry = sortedCost[0];
  const playstyle = carry.cost <= 2 ? (rng(seed)() > .5 ? PLAYSTYLES[2] : PLAYSTYLES[3]) : pick(seed + 'ps', [PLAYSTYLES[0], PLAYSTYLES[1]]);
  // core: carry + up to 4 trait members
  const core = [carry];
  members.filter((m) => m !== carry).sort((a, b) => b.cost - a.cost).slice(0, 4).forEach((m) => core.push(m));
  // add frontline / fillers from other traits to reach 8
  const fillers = RAW.champions.filter((c) => !core.includes(c) && (isFront(c) || c.cost >= 4))
    .sort((a, b) => (isFront(b) - isFront(a)) || (rng(seed + b.key)() - 0.5));
  let i = 0;
  while (core.length < 8 && i < fillers.length) { core.push(fillers[i++]); }
  const traits = activeTraits(core).filter((t) => t.on);
  const mainTrait = theme.name;
  const secondCarry = core.find((c) => c !== carry && c.cost >= 4 && !isFront(c));
  // metrics
  const tierRoll = rng(seed + 'tier')();
  const avg = playstyle.key === 'reroll' ? rand(seed + 'a', 4.1, 4.8) : rand(seed + 'a', 3.95, 4.7);
  const tier = tierFromPlacement(avg);
  const delta = rand(seed + 'd', -0.25, 0.28);
  const carryBis = bisFor(carry.name);
  const items = carryBis ? carryBis.items : bestItemsFor(carry, 'cit' + idx);
  const items2 = secondCarry ? ((bisFor(secondCarry.name) || {}).items || bestItemsFor(secondCarry, 'cit2' + idx)) : [];
  // level timeline
  const timeline = playstyle.key === 'reroll'
    ? [{ s: '2-1', t: '레벨4 — 무리해서 굴리지 말고 이자 적립' }, { s: '3-2', t: `레벨5~6에서 굴리면서 ${carry.name} 모으기` }, { s: '4-1', t: `50골드 유지하며 ${carry.name} 3성 슬로우롤` }, { s: '5-1', t: '3성 떴으면 레벨업 + 마무리 유닛 추가' }]
    : [{ s: '2-1', t: '연승/연패 한 방향 + 골드 세팅' }, { s: '3-2', t: '안정적 앞라인 + 아이템 슬램' }, { s: '4-1', t: '레벨7, 적정 롤로 핵심 유닛 확보' }, { s: '4-5~5-1', t: `8렙 찍고 ${carry.name}에 ${items[0]?.name || '핵심템'} 몰빵` }];
  // why text (community voice)
  const frontList = core.filter(isFront).slice(0, 2).map((c) => c.name).join('·');
  const why = playstyle.key === 'reroll'
    ? `${carry.cost}코 ${eul(carry.name)} 3성으로 굴려 캐리하는 ${mainTrait} 리롤 덱. ${frontList || '앞라인'} 앞세워 버티는 동안 ${iga(carry.name)} ${items[0]?.name || '핵심 아이템'} 끼고 폭딜. 저점이 낮아 안정적이지만 ${carry.name} 경합 들어오면 무너지니 정찰 필수.`
    : `${eul(carry.name)} 메인 캐리로 ${mainTrait} 시너지를 굴리는 정석 덱. 8렙에서 ${carry.name}에 ${items.map((x) => x.name).slice(0, 2).join('·')} 몰아주고, ${frontList || '탱라인'} 앞세워 ${carry.name} 딜 시간을 버는 구조. 고점이 높아 1등을 노릴 수 있음.`;
  // counters
  const counters = ['암살자 침투 덱(뒷라인 노출 주의)', '강력한 광역 CC 조합', '같은 핵심 유닛 경합 2명 이상'];
  // positioning: assign hexes (rows 0=back .. 3=front) ; carry back corner
  const positions = assignPositions(core, carry, seed);
  // augments fit
  const augFit = RAW.augments.filter((a) => AUG_STATS[a.name].avg < 4.45).sort((a, b) => AUG_STATS[a.name].avg - AUG_STATS[b.name].avg).slice(0, 4 + (idx % 3));
  const carryStar = carryBis ? carryBis.star : ((playstyle.key === 'reroll' || playstyle.key === 'hyperroll') ? 3 : 2);
  // units that must hit 3-star: carry (if 3★ target) + low-cost cores whose BiS says 3★
  const threeStar = core.filter((c) => {
    if (c === carry) return carryStar === 3;
    const b = bisFor(c.name); if (b) return b.star === 3;
    return carryStar === 3 && c.cost <= 2 && (c.traits || []).includes(mainTrait);
  }).map((c) => c.key);
  return {
    id: 'c' + idx, name: `${mainTrait} ${carry.name}`, theme: mainTrait, carry, secondCarry, carryStar, threeStar,
    tier, avg, top4: Math.max(40, 60 - (avg - 4.1) * 22), pickRate: rand(seed + 'pr', 1.5, 14), winRate: Math.max(9, 22 - (avg - 4) * 13), delta,
    playstyle, difficulty: playstyle.diff, core, traits, items, items2, timeline, why, counters, positions,
    augments: augFit, sample: Math.round(rand(seed + 'n', 6000, 120000)),
  };
}

/* map a researched playstyle string → one of our PLAYSTYLES */
function realPlaystyle(deck) {
  const p = deck.playstyle || '';
  if (/1코|1\s*코스트|1코스트/.test(p)) return PLAYSTYLES[3]; // 1코 리롤
  if (/리롤|슬로우롤|하이퍼롤|2코|3코|4코|저코/.test(p)) return PLAYSTYLES[2]; // 리롤
  if (/패스트\s*8|풀\s*8|패스트8/.test(p)) return PLAYSTYLES[0]; // 패스트8
  return PLAYSTYLES[1]; // 정석
}

/* build a comp object from a researched meta deck (window.TFT_META) */
function buildRealComp(deck, idx) {
  const seed = 'rcomp' + idx + deck.name;
  const champLookup = (n) => champByName[n] || champByName[CHAMP_ALIAS[n]] || null;
  const mapNames = (arr) => (arr || []).map(champLookup).filter(Boolean);
  const core = mapNames(deck.keyUnits);
  let carry = mapNames(deck.carries)[0] || [...core].sort((a, b) => (isFront(a) - isFront(b)) || (b.cost - a.cost))[0];
  if (!carry) return null; // can't build without an identifiable carry
  if (!core.includes(carry)) core.unshift(carry);
  // pad to a believable final board (8) with trait-synergy + frontline fillers
  // so thin/niche decks still render a full comp like meta sites show.
  const primaryTrait = (deck.traitsParsed && deck.traitsParsed[0] && deck.traitsParsed[0].name) || '';
  if (core.length < 8) {
    const pool = RAW.champions.filter((c) => !core.includes(c)).sort((a, b) => {
      const at = (a.traits || []).includes(primaryTrait) ? 1 : 0, bt = (b.traits || []).includes(primaryTrait) ? 1 : 0;
      return (bt - at) || (isFront(b) - isFront(a)) || (b.cost - a.cost);
    });
    let p = 0; while (core.length < 8 && p < pool.length) core.push(pool[p++]);
  }
  let secondCarry = mapNames(deck.carries).find((c) => c !== carry)
    || core.find((c) => c !== carry && c.cost >= 4 && !isFront(c)) || null;
  const playstyle = realPlaystyle(deck);
  const reroll = playstyle.key === 'reroll' || playstyle.key === 'hyperroll';
  const lv = deck.level || '8';

  const pm = deck.placement || {};
  const avg = pm.avg || ({ S: 4.05, A: 4.3, B: 4.52, C: 4.72 }[deck.tier] || 4.5);
  const tier = deck.tier || tierFromPlacement(avg);
  const top4 = Math.min(92, pm.top4 != null ? pm.top4 * 100 : Math.max(38, 62 - (avg - 4) * 22));
  const top4Est = pm.top4 == null; // true = 평균등수에서 추정(실측 아님)
  const winRate = Math.min(30, pm.win != null ? pm.win * 100 : Math.max(8, 22 - (avg - 4) * 13));
  const winEst = pm.win == null;

  const carryBis = bisFor(carry.name);
  // 덱 데이터가 직접 제공한 캐리 정템(MetaTFT 삼신기)을 우선, 없으면 캐리별 삼신기에서 파생
  const items = (deck.items && deck.items.length) ? mapItemNames(deck.items) : synergyBiS(carry).items;
  const items2 = secondCarry ? synergyBiS(secondCarry).items : [];
  const traits = activeTraits(core).filter((t) => t.on);
  const carryStar = carryBis ? carryBis.star : (reroll ? 3 : 2);
  const threeStar = core.filter((c) => {
    if (c === carry) return carryStar === 3;
    const b = bisFor(c.name); return b ? b.star === 3 : false;
  }).map((c) => c.key);

  const timeline = reroll
    ? [{ s: '2-1', t: '레벨3~4 — 무리해서 굴리지 말고 이자 적립' }, { s: '3-2', t: `레벨${carry.cost <= 2 ? '5' : '6'}에서 ${carry.name} 모으며 굴리기` }, { s: '4-1', t: `50골드 유지 슬로우롤로 ${carry.name} 3성` }, { s: '5-1', t: `3성 완성 후 레벨${lv}까지 올려 마무리` }]
    : [{ s: '2-1', t: '한 방향(연승/연패) + 골드 세팅' }, { s: '3-2', t: '앞라인 + 아이템 슬램으로 체력 보존' }, { s: '4-1', t: '레벨7, 적정 롤로 핵심 유닛 확보' }, { s: '4-5~5-1', t: `레벨${lv} 찍고 ${carry.name}에 ${items[0]?.name || '정템'} 몰빵` }];

  const why = deck.why || `${deck.name} — 현 패치 ${tier}티어 덱.`;
  const rising = /상승세|Rising|부상|재정착|살아남|상향|올림|끌어올/.test(why);
  // only real downtrend words — NOT bare '하락' (appears in conditional caveats like "A로 하락")
  const falling = /하향|Falling|하락세|떨어[지졌]|약세|식었/.test(why);
  // delta convention: negative = avg placement dropped = deck improving ("up")
  const delta = rising ? rand(seed + 'd', -0.26, -0.06) : falling ? rand(seed + 'd', 0.06, 0.26) : rand(seed + 'd', -0.06, 0.06);
  const pickRange = { S: [6, 14], A: [3, 8], B: [1.5, 5], C: [0.5, 2.5] }[tier] || [1, 4];

  const frontList = core.filter(isFront).slice(0, 2).map((c) => c.name).join('·');
  const counters = [
    secondCarry || !isFront(carry) ? '암살자/침투 덱 — 캐리 뒷라인 노출 주의' : '강력한 광역 폭딜에 앞라인이 먼저 녹는지 확인',
    `핵심 유닛(${carry.name}${secondCarry ? '·' + secondCarry.name : ''}) 경합 2명 이상이면 라인 회피`,
    reroll ? '같은 리롤 경합 시 한 명은 무너짐 — 정찰 필수' : '광역 CC 조합엔 산개 배치로 대응',
  ];
  const positions = assignPositions(core, carry, seed);
  const augFit = RAW.augments.filter((a) => AUG_STATS[a.name] && AUG_STATS[a.name].avg < 4.45)
    .sort((a, b) => AUG_STATS[a.name].avg - AUG_STATS[b.name].avg).slice(0, 4 + (idx % 3));

  return {
    id: deck.id || ('rc' + idx), rank: deck.rank, name: deck.name, theme: (deck.traitsParsed && deck.traitsParsed[0] && deck.traitsParsed[0].name) || '',
    carry, secondCarry, carryStar, threeStar,
    tier, avg, top4, top4Est, pickRate: rand(seed + 'pr', pickRange[0], pickRange[1]), pickEst: true, winRate, winEst, delta,
    playstyle, difficulty: playstyle.diff, core, traits, items, items2, timeline, why, counters, positions,
    augments: augFit, sample: Math.round(rand(seed + 'n', 6000, 140000)),
    research: true, level: lv, wantTraits: deck.traits || [],
  };
}

function assignPositions(core, carry, seed) {
  // 4 rows x 7 cols. front=row3 (closest to enemy). frontline front, carry back corner.
  const taken = {};
  const pos = {};
  const place = (c, row, col) => { let k = row + ',' + col; let g = 0; while (taken[k] && g < 28) { col = (col + 1) % 7; if (col === 0) row = (row + 1) % 4; k = row + ',' + col; g++; } taken[k] = 1; pos[c.key] = { row, col }; };
  // carry back corner
  place(carry, 0, rng(seed)() > .5 ? 0 : 6);
  core.filter((c) => c !== carry).forEach((c, i) => {
    if (isFront(c)) place(c, 3, 1 + (i % 5));
    else place(c, 1, 1 + (i % 5));
  });
  return pos;
}

/* Prefer the researched meta tier list (window.TFT_META). Fall back to
   synthetic theme-based comps only if research data is unavailable. */
const META_RAW = (typeof window !== 'undefined' && window.TFT_META) || [];
let COMPS;
if (META_RAW.length) {
  COMPS = META_RAW.map((d, i) => buildRealComp(d, i)).filter(Boolean);
} else {
  const COMP_THEMES = RAW.traits
    .filter((t) => RAW.champions.filter((c) => (c.traits || []).includes(t.name)).length >= 4)
    .filter((t) => !/\+|\d/.test(t.name));
  COMPS = COMP_THEMES.map((t, i) => buildComp(t, i)).filter(Boolean);
  const seenCarry = new Set();
  COMPS = COMPS.filter((c) => { if (seenCarry.has(c.carry.key)) return false; seenCarry.add(c.carry.key); return true; })
    .sort((a, b) => a.avg - b.avg).slice(0, 16);
}
// rank by tier then avg placement (best first)
COMPS.sort((a, b) => (TIER_ORDER.indexOf(a.tier) - TIER_ORDER.indexOf(b.tier)) || (a.avg - b.avg));
COMPS.forEach((c, i) => { c.rank = i + 1; });

/* meta snapshot — 실제 MetaTFT 데이터 기준(패치·갱신시각·표본). */
function metaSnapshot() {
  const updated = REAL_STATS.updated || null;
  return {
    patch: REAL_STATS.patch || '17.6',
    updated,
    updatedAgoMin: updated ? Math.max(0, Math.round((Date.now() - updated) / 60000)) : null,
    games: REAL_STATS.games || null, daysWindow: REAL_STATS.daysWindow || 7,
    bracket: REAL_STATS.bracket || 'Diamond+',
    region: 'KR', rankBand: '다이아+',
    rising: COMPS.filter((c) => c.delta < -0.05).sort((a, b) => a.delta - b.delta).slice(0, 4),
    falling: COMPS.filter((c) => c.delta > 0.08).sort((a, b) => b.delta - a.delta).slice(0, 4),
    topComps: COMPS.slice(0, 6),
  };
}
/* '방금/N분 전/N시간 전/N일 전' — 실제 갱신 경과 표시 */
function agoLabel(ts) {
  if (!ts) return '—';
  const min = Math.max(0, Math.round((Date.now() - ts) / 60000));
  if (min < 1) return '방금';
  if (min < 60) return min + '분 전';
  const hr = Math.round(min / 60);
  if (hr < 24) return hr + '시간 전';
  return Math.round(hr / 24) + '일 전';
}


/* ===================== 15-engine.jsx ===================== */
/* ============================================================
   15-engine — pure domain logic: combat simulator, live coach
   recommender, personalized leak analyzer + DataSource impls.
   ============================================================ */

/* ============================================================
   Combat win-rate engine (Tier-1 analytic model)
   Distilled from pro/combat research: star-scaled stats, type-split
   DPS, type-weighted EHP, frontline-gated TTK race, logistic win%.
   ============================================================ */
const STAR_MULT = { 1: 1, 2: 1.8, 3: 3.24 };          // HP & AD scaling
const STAGE_DMG = { 1: 0, 2: 2, 3: 5, 4: 8, 5: 10, 6: 12, 7: 17 }; // player dmg on loss
const COMBAT_K = 1.6;   // logistic slope (research-calibrated)
const SURV_K2 = 0.4;    // survivor-margin weight

/* per-item stat contribution by tag (calibrated to Set 17 item magnitudes) */
function itemBonus(it) {
  const t = it.tags || [];
  const b = { ad: 0, ap: 0, as: 0, crit: 0, hp: 0, armor: 0, mr: 0, amp: 0 };
  if (t.includes('ad')) b.ad += 0.45;       // ~Deathblade/IE class
  if (t.includes('ap')) b.ap += 45;
  if (t.includes('as')) b.as += 0.30;
  if (t.includes('crit')) b.crit += 0.30;
  if (t.includes('tank')) { b.hp += 300; b.armor += 25; b.mr += 25; }
  if (t.includes('mana')) b.ap += 15;
  if (t.includes('util')) b.amp += 0.05;
  return b;
}

/* per-unit damage (split phys/magic) + survivability inputs */
function unitStats(entry) {
  const c = entry.champ; if (!c) return null;
  const st = c.stats || {};
  const star = STAR_MULT[entry.star || (c.cost >= 4 ? 1 : 2)] || 1;
  let ad = (st.ad || 50), ap = 0, as = (st.as || 0.7), crit = (st.crit || 0.25);
  let hp = (st.hp || 650), armor = (st.armor || 30), mr = (st.mr || 30), amp = 1;
  (entry.items || []).forEach((it) => { const b = itemBonus(it); ad *= 1 + b.ad; ap += b.ap; as *= 1 + b.as; crit += b.crit; hp += b.hp; armor += b.armor; mr += b.mr; amp *= 1 + b.amp; });
  ad *= star; hp *= star;                       // star scales AD & HP (research)
  as = Math.min(as, 5.0); crit = Math.min(crit, 1.0);
  const apUnit = isAP(c);
  const apEff = ap + (apUnit ? 60 : 0);         // AP carries have innate spell power
  const critFactor = 1 + crit * 0.40;
  const physDps = ad * as * critFactor * (apUnit ? 0.30 : 1) * amp;
  const magicDps = apEff * as * 0.60 * (apUnit ? 1 : 0.15) * amp;
  return { physDps, magicDps, dps: physDps + magicDps, hp, armor, mr, front: isFront(c) || (entry.row != null && entry.row >= 2) };
}

/* aggregate a side; EHP is type-weighted by the ENEMY's damage split */
function sideScalars(units, enemyPhysShare) {
  const sp = enemyPhysShare, sm = 1 - sp;
  let dps = 0, physDps = 0, frontEHP = 0, backEHP = 0;
  units.forEach((u) => {
    if (!u) return;
    dps += u.dps; physDps += u.physDps;
    const mit = sp * (100 / (100 + u.armor)) + sm * (100 / (100 + u.mr));
    const ehp = u.hp / Math.max(0.15, mit);
    if (u.front) frontEHP += ehp; else backEHP += ehp;
  });
  return { dps, physShare: dps > 0 ? physDps / dps : 0.7, frontEHP, backEHP, ehp: frontEHP + backEHP };
}

/* deterministic analytic combat: P(win) of side A vs side B */
function resolveCombat(unitsA, unitsB) {
  const a0 = sideScalars(unitsA, 0.6), b0 = sideScalars(unitsB, 0.6);
  const A = sideScalars(unitsA, b0.physShare), B = sideScalars(unitsB, a0.physShare);
  const frontShare = (s) => (s.ehp > 0 ? s.frontEHP / s.ehp : 0);
  const effEHP = (s) => s.ehp * (0.8 + 0.4 * Math.min(1, frontShare(s) / 0.45)); // frontline protects backline
  const tA = A.dps > 0 ? effEHP(B) / A.dps : 1e6;  // time for A to kill B
  const tB = B.dps > 0 ? effEHP(A) / B.dps : 1e6;
  const ratio = tB / Math.max(0.001, tA);          // >1 => A kills faster
  const survA = Math.max(0, 1 - tA / Math.max(0.001, tB));
  const survB = Math.max(0, 1 - tB / Math.max(0.001, tA));
  let p = 1 / (1 + Math.exp(-(COMBAT_K * Math.log(Math.max(0.01, ratio)) + SURV_K2 * (survA - survB))));
  p = Math.max(0.02, Math.min(0.98, p));
  return { pWin: p, teamDps: A.dps, frontEHP: A.frontEHP, totalEHP: A.ehp, ratio };
}

/* synthetic average-lobby board scaled to each stage (self-calibrating via unitStats) */
const AVG_PROFILE = {
  2: [[1, 2], [1, 2], [1, 1], [2, 1]],
  3: [[1, 2], [2, 2], [2, 2], [1, 2], [3, 1], [2, 1]],
  4: [[4, 1], [2, 2], [2, 2], [3, 2], [1, 2], [3, 1], [1, 2]],
  5: [[4, 2], [4, 1], [3, 2], [2, 2], [2, 2], [3, 2], [1, 2], [5, 1]],
  6: [[4, 2], [4, 2], [5, 1], [3, 2], [3, 2], [2, 2], [2, 2], [4, 1], [1, 2]],
  7: [[5, 2], [4, 2], [4, 2], [4, 2], [3, 2], [3, 2], [2, 2], [4, 1], [5, 1]],
};
const _avgBoardCache = {};
function avgBoard(stage) {
  const s = Math.max(2, Math.min(7, stage || 4));
  if (_avgBoardCache[s]) return _avgBoardCache[s];
  const prof = AVG_PROFILE[s];
  const board = prof.map((p, i) => {
    const [cost, star] = p;
    const pool = RAW.champions.filter((c) => c.cost === cost);
    const champ = pool.length ? pool[(i * 7 + s) % pool.length] : RAW.champions[0];
    const items = i === 0 ? bestItemsFor(champ, 'avgc' + s).slice(0, 3) : (i < 3 ? bestItemsFor(champ, 'avgb' + s).slice(0, 1) : []);
    return unitStats({ champ, star, items });
  }).filter(Boolean);
  _avgBoardCache[s] = board;
  return board;
}

/* combat / board simulation — analytic win-rate vs the stage's average lobby */
function combatSim(board, ctx) {
  const entries = board.filter((e) => e.champ);
  const traits = activeTraits(entries.map((e) => e.champ));
  const traitMult = 1 + traits.reduce((a, t) => a + t.style * 0.03, 0);
  const ehpMult = Math.sqrt(traitMult);
  const my = entries.map(unitStats).filter(Boolean).map((u) => ({
    ...u, dps: u.dps * traitMult, physDps: u.physDps * traitMult, magicDps: u.magicDps * traitMult, hp: u.hp * ehpMult,
  }));
  const stageNum = ctx?.stage ? parseInt(ctx.stage) : 4;
  const res = resolveCombat(my, avgBoard(stageNum));
  const winVsAvg = Math.max(2, Math.min(98, Math.round(res.pWin * 100)));
  const expectedPlacement = Math.max(1, Math.min(8, 4.5 - (res.pWin - 0.5) * 6));
  // per-round curve: this board's win% vs each stage's average lobby (shows fall-off)
  const perRound = [];
  for (let s = 2; s <= 7; s++) {
    const r = resolveCombat(my, avgBoard(s));
    const hpLoss = +((1 - r.pWin) * (STAGE_DMG[s] + Math.round((1 - r.pWin) * Math.min(6, s)))).toFixed(1);
    perRound.push({ stage: s, winRate: Math.round(r.pWin * 100), hpLoss });
  }
  // positioning heatmap (carry safety) 4x7
  const heat = [];
  for (let r = 0; r < 4; r++) { const row = []; for (let col = 0; col < 7; col++) {
    let v = (r) * 0.22; v += (col === 0 || col === 6) ? 0.18 : 0; v -= Math.abs(col - 3) * 0.02;
    row.push(Math.max(0, Math.min(1, v + 0.1)));
  } heat.push(row); }
  return {
    teamDps: Math.round(res.teamDps), frontlineEHP: Math.round(res.frontEHP), totalEHP: Math.round(res.totalEHP),
    expectedPlacement, winVsAvg, traits, traitMult, heat, unitCount: my.length, perRound,
  };
}

/* ---- econ / level constants ---- */
const INTEREST_BP = [10, 20, 30, 40, 50];
const ROLL_ODDS = { // % chance per shop slot by level (simplified, cost 1..5)
  4: [55, 30, 15, 0, 0], 5: [45, 33, 20, 2, 0], 6: [30, 40, 25, 5, 0],
  7: [19, 35, 35, 10, 1], 8: [17, 24, 32, 24, 3], 9: [15, 18, 25, 30, 12], 10: [5, 10, 20, 40, 25],
};

/* ---- live coach recommender ---- */
function coachRecommend(state) {
  const { gold = 50, hp = 70, level = 7, stage = '4-1', contest = 1, targetUnit, boardStrength = 0.5, components = 0 } = state;
  const stageNum = parseInt(stage) || 4;
  const round = stage;
  const out = { winChance: 0, lobbyDifficulty: 'normal', pivotTree: [], econNote: '', tags: [] };

  // win chance from board strength + hp
  out.winChance = Math.max(3, Math.min(97, Math.round(boardStrength * 70 + (hp / 100) * 25 + (level - 7) * 3)));
  out.lobbyDifficulty = contest >= 2 ? 'hard' : contest <= 0 ? 'easy' : 'normal';

  let action, why;
  const nextBp = INTEREST_BP.find((b) => b > gold);
  const lowHp = hp <= 30;
  const critHp = hp <= 18;

  if (critHp && boardStrength < 0.55) {
    action = '지금 풀로 리롤 — 생존 먼저';
    why = `체력 ${hp}, 이번 라운드 지면 강등각. 골드·이자 다 포기하고 ${gold}골드 박아서 보드부터 세워. 지금은 등수 욕심보다 안 죽는 게 이득.`;
    out.tags = ['위기관리', '저점방어'];
  } else if (lowHp && boardStrength < 0.6) {
    action = `${Math.max(0, gold - 20)}골드까지 리롤 — 20골드는 남겨`;
    why = `체력 ${hp}로 압박은 있지만 아직 버틸 만함. 20골드(이자 2개) 남기고 굴려서 보드 보강, 다음 라운드 한 번 더 보고 판단.`;
    out.tags = ['안정화'];
  } else if (level <= 7 && stageNum >= 4 && gold >= 50 && hp > 45) {
    action = '레벨업 푸시 — 8렙 먼저 찍기';
    why = `4스테이지에 50골드+체력 여유면 패스트8 타이밍. ${level}렙에서 리롤하지 말고 8렙 찍어서 고코스트 확률 올리고, 8렙에서 굴려야 캐리가 빨리 떠.`;
    out.tags = ['패스트8', '레벨업'];
  } else if (targetUnit && contest >= 2) {
    action = `리롤 자제 — ${targetUnit} 경합 ${contest}명, 갈아타기 고려`;
    why = `${targetUnit} 노리는 사람이 너 포함 ${contest + 1}명이면 잘 안 떠서 골드만 녹아. 같은 라인 다른 캐리로 갈아타거나, 한 명이 손절할 때까지 이자 챙기면서 대기.`;
    out.tags = ['경합', '갈아타기'];
  } else if (nextBp && gold < 50 && !lowHp) {
    action = `리롤 자제 — ${nextBp}골드 이자 라인 채우기`;
    why = `지금 ${gold}골드. ${nextBp}골드 찍으면 이자 ${Math.floor(nextBp / 10)}개라 라운드당 ${Math.floor(nextBp / 10)}골드씩 굴러옴. 체력 여유 있으니 굴리지 말고 골드 우선, 50 만들고 한 번에 슬로우롤.`;
    out.tags = ['골드 관리'];
  } else if (gold >= 50) {
    action = components >= 2 ? '50골드 슬로우롤 + 아이템 슬램' : '50골드 유지 슬로우롤';
    why = `50골드 이자 받으면서 5골드씩만 굴리는 슬로우롤 구간. ${components >= 2 ? `벤치에 조합템 ${components}개 있으니 완템 만들어서 캐리한테 바로 박아.` : '핵심 유닛 별 올리는 데 집중.'}`;
    out.tags = ['슬로우롤'];
  } else {
    action = '골드 유지 — 다음 라운드 재평가';
    why = `지금은 크게 흔들 타이밍 아님. 이자 챙기면서 연승/연패 한 방향으로 끌고 가고, ${stageNum + 1}스테이지 들어가면 다시 판단.`;
    out.tags = ['운영'];
  }

  out.action = action; out.why = why;
  // econ note (emotional econ)
  if (gold < 20 && stageNum >= 4 && hp < 50) out.econNote = '⚠ 패닉 리롤 주의 — 지금 0골드까지 굴리면 다음 스테이지 통째로 말림. 한 라운드 지더라도 골드 복구가 이득일 때가 많음.';
  else if (gold > 55 && hp > 60) out.econNote = '💡 오버골드 주의 — 50 넘게 쌓고 체력 좋을 때 안 굴리면 고점 놓침. 지금이 흔들 타이밍일 수 있음.';

  // pivot tree
  if (targetUnit) {
    out.pivotTree = [
      { cond: `${targetUnit} 적중 (잘 뜸)`, line: `그대로 ${targetUnit} 캐리 굳히고 아이템 몰빵`, place: '예상 2~4등', good: true },
      { cond: `${targetUnit} 안 뜸 (경합/저점)`, line: '같은 프론트 공유하는 차선 캐리로 갈아타기, 손해 최소화', place: '예상 4~6등', good: false },
    ];
  } else {
    out.pivotTree = [
      { cond: '8렙 핵심 유닛 적중', line: '메인 캐리에 베스트 아이템 완성 → 고점 노림', place: '예상 1~4등', good: true },
      { cond: '핵심 유닛 저점', line: '플렉스로 안정화, top4 확보 우선', place: '예상 4~6등', good: false },
    ];
  }
  return out;
}

/* ---- holistic "순방 최대화" recommender ----
   Every choice is scored in one currency: ΔExpPlace (combatSim hypothetical),
   weighted by health (ρ) and gold-price (λ). Folds combat/traits/stars/econ. */
const K_PLACE = 6;
function liveRecommend(state) {
  const { board = [], shop = [], gold = 50, level = 7, hp = 70, stage = '4-2' } = state;
  const ctx = { stage, level };
  const baseArr = board.map((u) => ({ champ: u.champ, star: u.star || 2, items: u.items || [], row: u.row }));
  const base = combatSim(baseArr, ctx);
  const onBoard = {}; board.forEach((u) => { onBoard[u.champ.key] = (onBoard[u.champ.key] || 0) + 1; });
  const tCount = {}; activeTraits(board.map((u) => u.champ)).forEach((t) => { tCount[t.name] = t.count; });
  const stageNum = parseInt(stage) || 4;
  const perR = (base.perRound || []).find((p) => p.stage === stageNum) || (base.perRound || [])[2] || { hpLoss: 6 };
  const survivalRounds = hp / Math.max(1, perR.hpLoss);
  const rho = Math.max(0, Math.min(1, (survivalRounds - 4) / 8));          // 0=위기, 1=안전
  const lambdaGold = 0.05 * (1 - rho * 0.4);                                // 골드 1당 등수가치(근사)

  const buys = shop.map((s, slot) => {
    if (!s || !s.champ) return null;
    const c = s.champ, cs = CHAMP_STATS[c.key], owned = onBoard[c.key] || 0;
    let hyp = baseArr.map((u) => ({ ...u }));
    const ex = hyp.find((u) => u.champ.key === c.key);
    if (ex) ex.star = Math.min(3, (ex.star || 1) + (owned >= 2 ? 1 : 0)); else hyp = [...hyp, { champ: c, star: 1, items: [], row: isFront(c) ? 3 : 0 }];
    const hsim = combatSim(hyp, ctx);
    const combatDelta = base.expectedPlacement - hsim.expectedPlacement;     // +면 등수 개선
    const reasons = []; let score = combatDelta * 3.2;
    if (owned >= 2) { score += 4.5; reasons.push('★★★ 직전'); } else if (owned) { score += 2.4; reasons.push('별업 진행'); }
    (c.traits || []).forEach((tn) => { const t = traitByName[tn]; if (t && t.breakpoints.some((b) => b.units === (tCount[tn] || 0) + 1)) { score += 1.6; reasons.push(`${tn} 활성각`); } });
    if (c.cost >= 4) { score += 1.4 + (cs ? Math.max(0, 4.7 - cs.avg) : 0); reasons.push('고코 캐리'); }
    score -= c.cost * lambdaGold;
    if (combatDelta > 0.08) reasons.unshift(`전투력 +${combatDelta.toFixed(2)}등`);
    return { slot, champ: c, cost: c.cost, score: +score.toFixed(2), reasons, afford: gold >= c.cost, avg: cs ? cs.avg : null, combatDelta: +combatDelta.toFixed(2) };
  }).filter(Boolean).sort((a, b) => b.score - a.score);

  // sell candidate: weakest board unit (leave-one-out), only if board full-ish & safe
  let sell = null;
  if (board.length >= level && board.length >= 7) {
    let worst = null, worstDrop = 1e9;
    baseArr.forEach((u, i) => { const woArr = baseArr.filter((_, j) => j !== i); const w = combatSim(woArr, ctx); const drop = w.expectedPlacement - base.expectedPlacement; if (drop < worstDrop) { worstDrop = drop; worst = u; } });
    if (worst && worstDrop < 0.15) sell = { champ: worst.champ, why: '보드에 기여 가장 낮음 — 자리 확보용 판매 고려' };
  }

  const twoStars = board.filter((u) => (u.star || 1) >= 2).length;
  const boardStrength = Math.min(1, (board.length / Math.max(6, level)) * (0.5 + 0.5 * twoStars / Math.max(1, board.length)));
  const macro = coachRecommend({ gold, hp, level, stage, contest: 1, boardStrength, components: 0 });
  const top4Est = Math.max(3, Math.min(97, Math.round(base.winVsAvg * 0.55 + boardStrength * 25 + rho * 8 + 12)));

  const topBuy = buys.find((b) => b.afford && b.score >= 1.5);
  const recommendedBuys = buys.filter((b) => b.afford && b.score >= 1.5);
  const top = topBuy ? { type: 'buy', text: `${topBuy.champ.name} 구매`, why: topBuy.reasons.join(' · ') || '가치 높음' } : { type: 'macro', text: macro.action, why: macro.why };
  return { buys, recommendedBuys, sell, macro, top, top4Est, winVsAvg: base.winVsAvg, expectedPlacement: base.expectedPlacement, rho: +rho.toFixed(2) };
}

/* augment 3-pick advisor: rank offered augments by 순방 (stat + comp fit) */
function augmentAdvice(offeredNames, board) {
  const trNames = new Set(activeTraits((board || []).map((u) => u.champ)).filter((t) => t.on).map((t) => t.name));
  return (offeredNames || []).map((nm) => {
    const a = RAW.augments.find((x) => x.name === nm) || { name: nm, kind: '일반' };
    const s = AUG_STATS[nm] || { avg: 4.6, top4: 50, first: 12 };
    let score = 0.7 * (4.5 - s.avg) + 0.3 * ((s.top4 - 50) / 100 * 6);
    let fit = ''; if (a.kind === '특성' && [...trNames].some((t) => nm.includes(t.slice(0, 2)))) { score += 0.6; fit = '내 시너지와 맞음'; }
    return { name: nm, kind: a.kind, score: +score.toFixed(2), avg: s.avg, top4: s.top4, fit, img: a.img };
  }).sort((x, y) => y.score - x.score);
}

/* god 가호 advisor: rank gods/blessings by 순방 (GOD_STATS) */
function godAdvice() {

}

/* ---- personalized leak analysis ---- */
function analyzeProfile(profile) {
  const matches = profile.matches || [];
  const n = matches.length || 1;
  const leaks = [];
  // ---- aggregate signals that genuinely vary per player (work for real match-v1 too) ----
  const P = matches.map((m) => m.placement);
  const avg = P.reduce((a, b) => a + b, 0) / n;
  const std = Math.sqrt(P.reduce((a, p) => a + (p - avg) * (p - avg), 0) / n);
  const bottomRate = matches.filter((m) => m.placement >= 7).length / n; // 7·8등
  const top4Rate = matches.filter((m) => m.placement <= 4).length / n;
  const winRate = matches.filter((m) => m.placement === 1).length / n;
  const avgLevel = matches.reduce((a, m) => a + (m.level || 8), 0) / n;
  const comps = matches.map((m) => m.comp || (m.carry && m.carry.name) || '기타');
  const compCount = {}; comps.forEach((c) => { compCount[c] = (compCount[c] || 0) + 1; });
  const distinct = Object.keys(compCount).length;
  const topC = Object.entries(compCount).sort((a, b) => b[1] - a[1])[0] || ['', 0];
  const topShare = topC[1] / n;
  // reroll vs fast split (style now classified from real 3★/level)
  const rr = matches.filter((m) => m.style === '리롤' || m.style === '1코 리롤');
  const fa = matches.filter((m) => !(m.style === '리롤' || m.style === '1코 리롤'));
  const avgOf = (a) => a.length ? a.reduce((s, m) => s + m.placement, 0) / a.length : null;
  const rerollAvg = avgOf(rr), fast8Avg = avgOf(fa), rerollShare = rr.length / n;
  const avgLevel8 = matches.reduce((a, m) => a + (m.level8Stage || 4.3), 0) / n;

  if (bottomRate >= 0.28) leaks.push({ type: '저점 관리', severity: 'high', placementCost: +Math.min(1.5, bottomRate * 3).toFixed(1),
    title: '터질 땐 7·8등 — 손절이 늦다',
    evidence: `최근 ${n}판 중 ${Math.round(bottomRate * 100)}%가 7·8등. 망한 판에서 전환·체력보존이 늦어 크게 터지는 패턴.`,
    fix: '3-2~4-1에 보드 약하고 체력 빠지면 욕심 접고 안전 덱·체력 보존. 8등 각이면 줄서기.',
    drill: '4스테이지 진입마다 "내 라인 살아있나?" 자문 → 아니면 즉시 차선 덱 전환.' });
  if (rerollAvg != null && fast8Avg != null && rerollAvg - fast8Avg > 0.8) leaks.push({ type: '덱 선택', severity: 'high', placementCost: +Math.min(1.4, rerollAvg - fast8Avg).toFixed(1),
    title: '리롤덱에서 유독 약하다',
    evidence: `리롤덱 평균 ${rerollAvg.toFixed(1)}등 vs 그 외 ${fast8Avg.toFixed(1)}등. 리롤 운영(슬로우롤·타이밍)에서 손해.`,
    fix: '확실히 열린 리롤만. 애매하면 정석/패스트8 위주로.',
    drill: '다음 10판 리롤 금지하고 평균 등수 비교.' });
  if (top4Rate < 0.45) leaks.push({ type: '고점 부족', severity: 'high', placementCost: +Math.min(1.6, (0.5 - top4Rate) * 4).toFixed(1),
    title: '순방 자체가 잘 안 나온다',
    evidence: `순방률 ${Math.round(top4Rate * 100)}% (상위권 보통 55%+). 보드 완성도·캐리 캡이 부족.`,
    fix: '메타 S덱 정석 라인부터. 정템 맞추고 핵심 별 올리는 데 집중.',
    drill: '메타 S덱 1개를 정템·포지션까지 똑같이 10판 반복.' });
  if (std >= 2.05) leaks.push({ type: '기복', severity: 'med', placementCost: +Math.min(1.2, std - 1.6).toFixed(1),
    title: '기복이 크다 (고점은 있는데 저점이 깊다)',
    evidence: `등수 편차 ${std.toFixed(1)}. 1등도 있지만 7·8등도 잦아 LP가 안 쌓이는 롤러코스터.`,
    fix: '고점 도박보다 안정 순방을 기본값으로. 확실할 때만 베팅.',
    drill: '10판 동안 "최소 4등" 목표로 안전 운영 — 편차 줄이기.' });
  if (top4Rate >= 0.5 && winRate < 0.12) leaks.push({ type: '마무리', severity: 'med', placementCost: 0.8,
    title: '순방은 잘하는데 1등 마무리를 못한다',
    evidence: `순방률 ${Math.round(top4Rate * 100)}%인데 1등률 ${Math.round(winRate * 100)}%. 2~4등에서 멈추는 안전 운영 위주.`,
    fix: '순방 확정 구간에선 8·9렙 푸시·고코 베팅으로 1등 시도.',
    drill: '순방 확정 시 한 번씩 보드 캡 올려 1등 노리기.' });
  if (rerollShare < 0.45 && avgLevel < 8.0) leaks.push({ type: '레벨링', severity: 'med', placementCost: +Math.min(1.0, (8.3 - avgLevel)).toFixed(1),
    title: '레벨을 덜 올린다',
    evidence: `평균 마무리 레벨 ${avgLevel.toFixed(1)} (상위권 보통 8.5~9.5). 고코스트 캐리 구간을 놓침.`,
    fix: '리롤덱이 아니면 4스테이지부터 8, 5스테이지에 9 푸시.',
    drill: '매 4-1에 "8렙 가능?" 체크하고 가능하면 레벨업.' });
  if (distinct <= 3 && topShare > 0.5 && topC[0]) leaks.push({ type: '덱 편식', severity: 'med', placementCost: +Math.min(0.9, topShare).toFixed(1),
    title: `'${topC[0]}'만 고집한다`,
    evidence: `${n}판 중 ${topC[1]}판(${Math.round(topShare * 100)}%)이 같은 덱. 막히거나 경합 나면 대안이 없음.`,
    fix: '주력 1~2덱 + 상황용 1덱. 초반 아이템·인구수 보고 유연하게.',
    drill: '다음 5판은 주력 덱 금지하고 다른 S덱 연습.' });
  if (leaks.length === 0) leaks.push({ type: '종합', severity: 'low', placementCost: 0.2, title: '큰 누수는 없음',
    evidence: `순방률 ${Math.round(top4Rate * 100)}%·평균 ${avg.toFixed(2)}등으로 전반적으로 안정적. 기복·덱 편식도 적음.`,
    fix: '고점(1등) 노리는 베팅 타이밍을 늘려보기.', drill: '순방 확정 판에서 한 번씩 9렙 푸시 시도.' });
  leaks.sort((a, b) => b.placementCost - a.placementCost);
  // turning points (per-match, from real signals)
  const lost = matches.filter((m) => m.placement >= 5).slice(0, 3).map((m) => ({
    matchId: m.id, placement: m.placement, comp: m.comp,
    turningRound: m.turningRound, what: m.turningWhat,
  }));
  const totalCost = leaks.reduce((a, l) => a + l.placementCost, 0);
  return { leaks, lost, summary: { topLeak: leaks[0], totalCost: +totalCost.toFixed(1), rerollAvg, fast8Avg, avgLevel8, top4Rate, winRate, std, bottomRate, avgLevel } };
}

/* ---- profile (summoner) generation ---- */
function genProfile(region, riotId) {
  const [rawName, rawTag] = String(riotId || 'Player').split('#');
  const name = (rawName || 'Player').trim();
  const tag = (rawTag || (String(region).toUpperCase() + '1')).trim();
  const seed = 'prof' + region + name + tag;
  const r = rng(seed);
  const ranks = ['다이아몬드 II', '다이아몬드 I', '마스터', '그랜드마스터'];
  const styles = ['정석', '패스트8', '리롤', '1코 리롤'];
  const matches = [];
  for (let i = 0; i < 22; i++) {
    const style = pick(seed + 'st' + i, styles);
    const placement = Math.max(1, Math.min(8, Math.round(rand(seed + 'pl' + i, style === '리롤' ? 4 : 2.5, style === '리롤' ? 8 : 6))));
    const comp = pick(seed + 'cp' + i, COMPS);
    matches.push({
      id: 'm' + i, placement, style, comp: comp.name, compObj: comp,
      queue: pick(seed + 'q' + i, ['ranked', 'ranked', 'ranked', 'doubleup']),
      level8Stage: rand(seed + 'l8' + i, 3.9, 4.9),
      lowGoldRounds: Math.floor(rand(seed + 'lg' + i, 0, 6)),
      contestedForced: r() > 0.7,
      lp: placement <= 4 ? Math.round(rand(seed + 'lp' + i, 8, 45)) : -Math.round(rand(seed + 'lp' + i, 8, 38)),
      turningRound: pick(seed + 'tr' + i, ['3-5', '4-2', '4-6', '5-1']),
      turningWhat: pick(seed + 'tw' + i, ['패닉 리롤로 골드 붕괴', '8렙 타이밍 놓침', '경합 캐리 고집', '아이템 배분 실수', '포지션 한 끗 차이']),
      // round timeline (hp/gold/xp/boardStrength per stage)
      timeline: Array.from({ length: 7 }, (_, s) => ({
        stage: (s + 2) + '-x', hp: Math.max(0, Math.round(100 - s * rand(seed + 'h' + i + s, 6, 16))),
        gold: Math.round(rand(seed + 'g' + i + s, 10, 60)), level: Math.min(9, 3 + s),
        boardStrength: Math.min(1, 0.2 + s * 0.12 + rand(seed + 'b' + i + s, -0.05, 0.1)),
      })),
    });
  }
  // lp history
  let lp = 320; const lpHistory = [lp];
  matches.slice().reverse().forEach((m) => { lp = Math.max(0, lp + m.lp); lpHistory.push(lp); });
  const top4 = matches.filter((m) => m.placement <= 4).length / matches.length * 100;
  const wins = matches.filter((m) => m.placement === 1).length / matches.length * 100;
  const avg = matches.reduce((a, m) => a + m.placement, 0) / matches.length;
  // mastery (best decks)
  const byComp = {};
  matches.forEach((m) => { (byComp[m.comp] = byComp[m.comp] || []).push(m.placement); });
  const mastery = Object.entries(byComp).map(([k, v]) => ({ comp: k, games: v.length, avg: v.reduce((a, b) => a + b, 0) / v.length }))
    .sort((a, b) => a.avg - b.avg).slice(0, 5);
  const soloRank = pick(seed + 'rk', ranks), soloLp = Math.round(rand(seed + 'lpc', 100, 600));
  return {
    region, name, tag, rank: soloRank, lp: soloLp,
    queues: { ranked: { tier: soloRank, lp: soloLp }, doubleup: { tier: pick(seed + 'rk2', ranks), lp: Math.round(rand(seed + 'lp2', 0, 400)) }, turbo: null },
    avgPlacement: avg, top4, winRate: wins, games: matches.length, lpHistory, matches, mastery,
  };
}

/* infer a concrete "여기서 터졌다" reason from a real match's final-state data */
function inferTurning(m) {
  const lv = m.level || 0;
  const units = m.units || [];
  const carry = units.find((u) => (u.items || []).length >= 2) || units[0];
  const carryItems = carry ? (carry.items || []).length : 0;
  const carryStar = carry ? (carry.star || 0) : 0;
  const has3 = units.some((u) => (u.star || 0) >= 3);
  const placement = m.placement;
  const dmg = m.dmg || 0;
  const cName = carry ? carry.name : (m.comp || '메인 캐리');
  // last_round (Riot) → rough stage label
  const lr = m.lastRound || 0;
  const stage = lr ? Math.max(2, Math.min(7, Math.floor((lr - 1) / 7) + 1)) : null;
  const roundTag = stage ? stage + '스테이지' : (lv ? 'Lv' + lv : '막판');
  let what;
  if (m.goldLeft != null && m.goldLeft >= 30) what = `골드 ${m.goldLeft} 남기고 탈락 — 안 쓰고 죽음(오버골드)`;
  else if (lv && lv <= 6) what = `레벨 ${lv}에서 멈춤 — 레벨링 너무 밀림`;
  else if (carryItems < 2) what = `${cName} 아이템 ${carryItems}개뿐 — 정템 못 맞춤`;
  else if (carryStar > 0 && carryStar < (carry.cost <= 2 ? 3 : 2)) what = `${cName} ${carryStar}성에 멈춤 — 캐리 별 못 올림`;
  else if (lv >= 8 && !has3 && placement >= 6) what = `${lv}렙인데 3성이 없음 — 보드 고점 부족`;
  else if (dmg > 0 && dmg < 25000 && placement >= 6) what = `딜량 ${fmt.int(dmg)} — 보드가 딜을 못 박음(포지션/매치업)`;
  else if (placement >= 7) what = `초중반에 말림 — 라인을 너무 늦게 정함(${cName})`;
  else what = `${cName} 라인 한 끗 차이 컷 — 배치/막 매치업에서 갈림`;
  return { round: roundTag, what };
}

/* ---- real profile loader (dev-server /api/profile proxy → Riot/DAK.GG) ---- */
function adaptRealProfile(rp, source) {
  const matches = (rp.matches || []).map((m, i) => {
    const turn = inferTurning(m);
    return {
    id: m.id || 'rm' + i, placement: m.placement, queue: m.queue || 'ranked',
    style: m.style || ((m.level || 8) >= 8 ? '패스트8' : '정석'),
    comp: m.comp || (m.carry && m.carry.name) || '기타',
    units: m.units || [], traits: m.traits || [], augments: m.augments || [], level: m.level, goldLeft: m.goldLeft, dmg: m.dmg,
    lp: m.placement <= 4 ? (5 - m.placement) * 8 : -((m.placement - 4) * 9),
    level8Stage: (m.level || 8) >= 9 ? 4.1 : (m.level || 8) >= 8 ? 4.5 : 5.3,
    lowGoldRounds: m.goldLeft != null ? (m.goldLeft < 10 ? 4 : m.goldLeft < 30 ? 2 : 0) : 1,
    contestedForced: false, turningRound: turn.round, turningWhat: turn.what,
    timeline: Array.from({ length: 7 }, (_, s) => ({ stage: (s + 2) + '-x', hp: Math.max(0, 100 - s * (m.placement <= 4 ? 9 : 15)), gold: 30, level: Math.min(m.level || 8, 3 + s), boardStrength: Math.min(1, 0.2 + s * 0.12) })),
    };
  });
  return {
    region: rp.region, name: rp.name, tag: rp.tag, rank: rp.rank || 'Unranked', lp: rp.lp || 0, queues: rp.queues || null,
    avgPlacement: rp.avgPlacement || 4.5, top4: rp.top4 || 0, winRate: rp.winRate || 0, games: rp.games || matches.length,
    lpHistory: (rp.lpHistory && rp.lpHistory.length > 1) ? rp.lpHistory : [rp.lp || 0, rp.lp || 0], matches, mastery: rp.mastery || [], real: true, source,
  };
}
function loadProfile(region, riotId) {
  const tryReal = (typeof fetch !== 'undefined')
    ? apiFetch('/api/profile?region=' + encodeURIComponent(region) + '&riotId=' + encodeURIComponent(riotId), { cache: 'no-store' }).then((r) => (r.ok ? r.json() : null)).catch(() => null)
    : Promise.resolve(null);
  return tryReal.then((j) => {
    if (j && j.profile && (j.profile.matches || []).length) { const p = adaptRealProfile(j.profile, j.source); return { ...p, report: analyzeProfile(p) }; }
    const p = genProfile(region, riotId); return { ...p, report: analyzeProfile(p), real: false, demoNote: (j && j.error) || null };
  });
}

/* real AI coaching diagnosis via dev proxy (Anthropic). null when no key/offline → caller uses rule-based. */
/* 실시간 코치 — 현재 상태를 서버 LLM에 보내 그때그때 동적 조언. 실패/키없음 → null(룰 기반 폴백). */
function aiCoachLive(state) {
  if (typeof fetch === 'undefined' || !state || state.gold == null) return Promise.resolve(null);
  const body = {
    stage: state.stage, level: state.level, gold: state.gold, hp: state.hp,
    targetUnit: state.targetUnit || null, contest: state.contest,
    boardStrength: state.boardStrength, components: state.components,
    lobby: (state.lobby || []).map((o) => ({ name: o.name, threat: Math.round((o.threat || 0) * 100), contestMine: !!o.contestMine })),
    comp: state.comp || null,
  };
  return apiFetch('/api/coach', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) })
    .then((r) => (r.ok ? r.json() : null)).then((j) => (j && j.advice) ? { ...j.advice, model: j.model } : null).catch(() => null);
}

function aiDiagnoseProfile(profile) {
  if (typeof fetch === 'undefined' || !profile || !(profile.matches || []).length) return Promise.resolve(null);
  const body = {
    name: profile.name, rank: profile.rank,
    matches: (profile.matches || []).map((m) => ({
      placement: m.placement, level: m.level, comp: m.comp, style: m.style,
      goldLeft: m.goldLeft, lastRound: m.lastRound, dmg: m.dmg,
      units: (m.units || []).map((u) => ({ name: u.name, cost: u.cost, star: u.star, items: (u.items || []).map((it) => it.name) })),
      traits: (m.traits || []).map((t) => ({ name: t.name, num: t.num })),
    })),
  };
  return apiFetch('/api/diagnose', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) })
    .then((r) => (r.ok ? r.json() : null)).then((j) => (j && j.diag) ? j.diag : null).catch(() => null);
}

/* real ladder leaderboard via dev proxy; falls back to deterministic mock */
function loadLeaderboard(region) {
  const tryReal = (typeof fetch !== 'undefined')
    ? apiFetch('/api/leaderboard?region=' + encodeURIComponent(region) + '&limit=40', { cache: 'no-store' }).then((r) => (r.ok ? r.json() : null)).catch(() => null)
    : Promise.resolve(null);
  return tryReal.then((j) => {
    if (j && j.players && j.players.length) {
      return { real: true, source: j.source, cached: j.cached, rows: j.players.map((p) => ({
        rank: p.rank, name: p.name || '(이름 비공개)', tag: p.tag || '', tier: p.tier || 'Challenger',
        lp: p.lp, games: p.games, wins: p.wins, losses: p.losses, top4: p.top4Rate, hotStreak: p.hotStreak, avg: null, fav: [],
      })) };
    }
    return { real: false, demoNote: (j && j.error) || null, rows: genLeaderboard(region) };
  });
}

/* ---------- Line chart (LP history) SVG ---------- */
function LineChart({ data, height = 90, color = 'var(--indigo-400)' }) {
  if (!data || data.length < 2) return null;
  const w = 100, h = height; const min = Math.min(...data), max = Math.max(...data);
  const rng2 = max - min || 1;
  const pts = data.map((v, i) => [(i / (data.length - 1)) * w, h - ((v - min) / rng2) * (h - 10) - 5]);
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = d + ` L${w} ${h} L0 ${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height }}>
      <defs><linearGradient id="lpg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="var(--indigo-500)" stopOpacity="0.3" /><stop offset="1" stopColor="var(--indigo-500)" stopOpacity="0" /></linearGradient></defs>
      <path d={area} fill="url(#lpg)" /><path d={d} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}

/* ---------- Multi-line stat timeline ---------- */
function Sparkline({ data, color = 'var(--pos)', height = 36 }) {
  if (!data || data.length < 2) return null;
  const w = 100, h = height, min = Math.min(...data), max = Math.max(...data), r = max - min || 1;
  const d = data.map((v, i) => (i ? 'L' : 'M') + ((i / (data.length - 1)) * w).toFixed(1) + ' ' + (h - ((v - min) / r) * (h - 6) - 3).toFixed(1)).join(' ');
  return <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height }}><path d={d} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" /></svg>;
}

/* ---------- Router ---------- */
const RouterContext = createContext(null);
function parseHash() {
  let h = (location.hash || '#/').replace(/^#/, '');
  if (!h.startsWith('/')) h = '/' + h;
  const [path, query] = h.split('?');
  const parts = path.split('/').filter(Boolean);
  return { path, parts, query: query || '' };
}
function Router({ children }) {
  const [loc, setLoc] = useState(parseHash());
  useEffect(() => {
    const on = () => { setLoc(parseHash()); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', on);
    if (!location.hash) location.hash = '#/';
    return () => window.removeEventListener('hashchange', on);
  }, []);
  const navigate = useCallback((to) => { if (('#' + to) !== location.hash) location.hash = '#' + to; }, []);
  const back = useCallback(() => history.back(), []);
  return <RouterContext.Provider value={{ ...loc, navigate, back }}>{children}</RouterContext.Provider>;
}
function useRouter() { return useContext(RouterContext); }
function Link({ to, className, children, onClick, style }) {
  const { navigate } = useRouter();
  return <a href={'#' + to} className={className} style={style} onClick={(e) => { e.preventDefault(); onClick && onClick(); navigate(to); }}>{children}</a>;
}

function DiffTag({ d }) {
  const map = { easy: ['쉬움', 'diff-easy'], normal: ['보통', 'diff-normal'], hard: ['어려움', 'diff-hard'] };
  const [t, c] = map[d] || map.normal;
  return <span className={cx('tag-diff', c)}>{t}</span>;
}

function CompUnits({ comp, size = 46 }) {
  return (
    <div className="comp-units">
      {comp.core.map((c, i) => (
        <ChampIcon key={c.key + i} champ={c} size={size}
          star={(comp.threeStar && comp.threeStar.includes(c.key)) ? 3 : (c === comp.carry ? (comp.carryStar || 2) : (c.cost <= 2 ? 2 : null))}
          items={c === comp.carry ? comp.items : (c === comp.secondCarry ? comp.items2 : null)} />
      ))}
    </div>
  );
}

function CompTraits({ comp }) {
  return (
    <div className="comp-traits">
      {comp.traits.slice(0, 6).map((t) => (
        <TraitTag key={t.name} trait={{ name: t.name, img: t.img }} count={t.count} active style={t.style} />
      ))}
    </div>
  );
}

/* Stat triple used in comp rows: 평균등수 / 순방률 / 픽률 */
function CompStats({ comp, compact }) {
  return (
    <div className="row" style={{ gap: compact ? 14 : 22 }}>
      <div className="col"><span className="muted" style={{ fontSize: 10 }}>평균등수</span><b className="tnum" style={{ fontSize: 15 }}>{fmt.place(comp.avg)}</b></div>
      <div className="col"><span className="muted" style={{ fontSize: 10 }}>순방률{comp.top4Est ? ' (추정)' : ''}</span><b className="tnum" style={{ fontSize: 15, color: comp.top4Est ? 'var(--text-secondary)' : 'var(--pos)' }} title={comp.top4Est ? '평균등수 기반 추정치 (실측 아님)' : '리서치 실측'}>{comp.top4Est ? '~' : ''}{fmt.pct(comp.top4, 0)}</b></div>
      {!compact && <div className="col"><span className="muted" style={{ fontSize: 10 }}>픽률</span><b className="tnum" style={{ fontSize: 15, color: 'var(--text-secondary)' }} title="추정치">~{fmt.pct(comp.pickRate)}</b></div>}
    </div>
  );
}

/* Mini hex board showing comp positioning */
function HexMini({ comp, heat }) {
  const byPos = {};
  comp && comp.core.forEach((c) => { const p = comp.positions[c.key]; if (p) byPos[p.row + ',' + p.col] = c; });
  return (
    <div className="hexgrid" style={{ transform: 'scale(.92)', transformOrigin: 'top left' }}>
      {[3, 2, 1, 0].map((row) => (
        <div className={cx('hexrow', row % 2 === 1 && 'odd')} key={row}>
          {[0, 1, 2, 3, 4, 5, 6].map((col) => {
            const c = byPos[row + ',' + col];
            const h = heat ? heat[row][col] : 0;
            return (
              <div key={col} className={cx('hex', c && 'filled')} style={{ width: 42, height: 48, background: heat ? `rgba(99,102,241,${h * 0.7})` : undefined }}>
                {c && <>
                  {c.img?.square ? <img src={c.img.square} alt="" /> : <div className="unit ph" style={{ width: '100%', height: '100%' }}>{c.name.slice(0, 2)}</div>}
                  <div className="hxcost" style={{ '--cc': COST_COLOR[c.cost] }} />
                  {c === comp.carry && <div className="hxstar" style={{ fontSize: 9 }}>★★</div>}
                </>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* board progressions — 초반/중반/최종 보드 단계별 라인업 (MetaTFT Board Progressions 패리티) */
function BoardProgressions({ comp }) {
  const core = comp.core || [];
  // 초반(레벨6): 캐리 + 저코·앞라인 6명 / 중반(레벨7): +1 / 최종(레벨8~): 전체
  const byCost = [...core].sort((a, b) => a.cost - b.cost);
  const ensureCarry = (arr) => (comp.carry && !arr.includes(comp.carry)) ? [comp.carry, ...arr].slice(0, arr.length) : arr;
  const early = ensureCarry(byCost.slice(0, Math.min(6, core.length)));
  const mid = ensureCarry(byCost.slice(0, Math.min(7, core.length)));
  const final = core;
  const stages = [
    { lv: 6, label: '초반 (레벨 6)', units: early, note: '저코·앞라인 + 캐리 확보, 체력 보존' },
    { lv: 7, label: '중반 (레벨 7)', units: mid, note: '핵심 유닛 2성 + 아이템 슬램' },
    { lv: (comp.level && +String(comp.level).match(/\d+/)) || 8, label: `최종 (레벨 ${(comp.level || 8)})`, units: final, note: `${comp.carry.name}에 정템 몰빵, 별 올리기` },
  ];
  return (
    <Card title="보드 단계별 진행 (운영 빌드업)" icon="builder">
      <div className="grid" style={{ gap: 12 }}>
        {stages.map((s, i) => (
          <div key={i} className="row" style={{ gap: 12, alignItems: 'flex-start', paddingBottom: i < stages.length - 1 ? 12 : 0, borderBottom: i < stages.length - 1 ? '1px solid var(--border)' : 0 }}>
            <div className="col" style={{ minWidth: 96, flexShrink: 0 }}>
              <span className="chip solid" style={{ alignSelf: 'flex-start' }}>{s.label}</span>
              <span className="muted" style={{ fontSize: 10.5, marginTop: 4, lineHeight: 1.4 }}>{s.note}</span>
            </div>
            <div className="row wrap" style={{ gap: 5, flex: 1 }}>
              {s.units.map((u, ui) => (
                <ChampIcon key={u.key + ui} champ={u}
                  star={(comp.threeStar && comp.threeStar.includes(u.key)) ? 3 : (u === comp.carry ? (comp.carryStar || 2) : (u.cost <= 2 ? 2 : null))}
                  items={u === comp.carry && i === stages.length - 1 ? comp.items : null} size={38} />
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="muted" style={{ fontSize: 11, marginTop: 10 }}>초반엔 앞라인·저코로 버티며 캐리 모으고, 레벨 올리며 고코 유닛으로 교체. 최종 보드 기준 정템·별은 위 '최종 조합' 참고.</div>
    </Card>
  );
}

/* ===================== 39-trends.jsx ===================== */
/* ============================================================
   39-trends — 메타 추세(상승/하락): 최근 vs 기준 기간 픽률·순방·평균등수 변화.
   패치 중반엔 변동이 거의 없고(안정), 패치 직후 자동으로 의미있는 값이 들어온다.
   데이터: REAL_STATS.trends (fetch-stats.mjs가 MetaTFT 최근/기준 윈도 델타로 생성).
   ============================================================ */
function TrendsPage() {
  const [kind, setKind] = useState('champions'); // 'champions' | 'items'
  const win = (typeof TRENDS !== 'undefined' && TRENDS.window) || { recent: 2, base: 7 };

  const champByName = useMemo(() => { const m = {}; RAW.champions.forEach((c) => { m[c.name] = c; }); return m; }, []);
  const itemByName = useMemo(() => { const m = {}; RAW.items.forEach((it) => { m[it.name] = it; }); return m; }, []);

  const rows = useMemo(() => {
    const src = kind === 'champions' ? TRENDS.champions : TRENDS.items;
    return Object.entries(src || {}).map(([name, t]) => ({ name, t, score: trendScore(t) }))
      .sort((a, b) => b.score - a.score);
  }, [kind]);

  const risers = rows.filter((r) => r.score > 0).slice(0, 12);
  const fallers = rows.filter((r) => r.score < 0).slice(-12).reverse();
  const anySignificant = rows.some((r) => trendSignificant(r.t));
  const maxMove = rows.reduce((m, r) => Math.max(m, Math.abs((r.t.dPick != null ? r.t.dPick : r.t.dPlay) || 0)), 0);

  const Row = ({ name, t }) => {
    const obj = kind === 'champions' ? champByName[name] : itemByName[name];
    const p = t.dPick != null ? t.dPick : t.dPlay;
    const rising = trendScore(t) > 0;
    return (
      <div className="row between" style={{ gap: 10, padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
        <div className="row" style={{ gap: 9, minWidth: 0, alignItems: 'center' }}>
          {obj ? (kind === 'champions' ? <ChampIcon champ={obj} size={30} /> : <ItemImg item={obj} size={28} />) : null}
          <b style={{ fontSize: 12.5, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</b>
          {!trendSignificant(t) && <span className="muted" style={{ fontSize: 9.5 }}>미미</span>}
        </div>
        <div className="row" style={{ gap: 12, flexShrink: 0, alignItems: 'center' }}>
          <div className="col" style={{ alignItems: 'flex-end' }}><span className="muted" style={{ fontSize: 9 }}>픽률</span><b className="tnum" style={{ fontSize: 12, color: rising ? 'var(--pos)' : 'var(--neg)' }}>{(p > 0 ? '+' : '') + p}%p</b></div>
          <div className="col" style={{ alignItems: 'flex-end' }}><span className="muted" style={{ fontSize: 9 }}>평균등수</span><b className="tnum" style={{ fontSize: 12, color: t.dAvg < 0 ? 'var(--pos)' : t.dAvg > 0 ? 'var(--neg)' : 'var(--text-muted)' }}>{(t.dAvg > 0 ? '+' : '') + t.dAvg}</b></div>
          <Icon name={rising ? 'up' : 'down'} size={16} className={rising ? 'pos' : 'neg'} style={{ color: rising ? 'var(--pos)' : 'var(--neg)' }} />
        </div>
      </div>
    );
  };

  const hasData = rows.length > 0;
  return (
    <div className="page">
      <PageHead title="메타 추세" sub={`최근 ${win.recent}일 vs 기준 ${win.base}일 변화 — 다이아+ MetaTFT 실데이터`} />
      <DataNote extra={`추세는 최근 ${win.recent}일과 ${win.base}일 통계의 차이입니다`} />

      {!anySignificant && hasData && (
        <Card icon="check">
          <div className="row" style={{ gap: 10, alignItems: 'center' }}>
            <span className="chip" style={{ background: 'var(--pos-soft)', color: 'var(--pos)', borderColor: 'transparent', fontWeight: 700 }}>현 패치 안정</span>
            <div className="muted" style={{ fontSize: 12, lineHeight: 1.55 }}>
              지금 패치는 메타가 굳어 큰 변동이 없습니다(최대 픽률 변화 {maxMove.toFixed(2)}%p). <b>새 패치가 적용되면</b> 이 화면에 상승·하락 챔피언이 자동으로 나타납니다.
            </div>
          </div>
        </Card>
      )}

      <Tabs tabs={[{ k: 'champions', label: '챔피언' }, { k: 'items', label: '아이템' }]} value={kind} onChange={setKind} />

      {!hasData ? (
        <Empty icon="meta" title="추세 데이터가 아직 없어요" sub="다음 자동 갱신(fetch-stats) 이후 표시됩니다" />
      ) : (
        <div className="grid cols-2" style={{ gap: 16 }}>
          <Card title="📈 상승세" icon="up" right={<span className="muted" style={{ fontSize: 10.5 }}>픽률↑ · 등수 개선순</span>}>
            {risers.length ? risers.map((r) => <Row key={r.name} {...r} />) : <div className="muted" style={{ fontSize: 12, padding: '10px 0' }}>상승 중인 항목이 없습니다.</div>}
          </Card>
          <Card title="📉 하락세" icon="down" right={<span className="muted" style={{ fontSize: 10.5 }}>픽률↓ · 등수 악화순</span>}>
            {fallers.length ? fallers.map((r) => <Row key={r.name} {...r} />) : <div className="muted" style={{ fontSize: 12, padding: '10px 0' }}>하락 중인 항목이 없습니다.</div>}
          </Card>
        </div>
      )}

      <Card icon="info" style={{ marginTop: 16 }}>
        <div className="muted" style={{ fontSize: 11.5, lineHeight: 1.6 }}>
          <b style={{ color: 'var(--text-secondary)' }}>읽는 법</b> — 픽률 +%p는 최근 들어 더 많이 픽됐다는 뜻, 평균등수가 음수면 등수가 좋아진 것(상승세). 표본이 적은 항목은 노이즈를 줄이려 제외했습니다. 패치 직후 며칠이 가장 신뢰도 높습니다.
        </div>
      </Card>
    </div>
  );
}

    </div>
  );
}

/* all completed items that include a given component (incl. same-component pairs) */
function recipesWith(compName) {
  return RAW.items.filter((it) => (it.components || []).includes(compName)).map((it) => {
    const comps = (it.components || []).slice();
    const idx = comps.indexOf(compName);
    const rest = comps.slice(0, idx).concat(comps.slice(idx + 1));
    const partnerName = rest[0] || compName; // [X,X] → partner is the same component
    const partner = RAW.components.find((c) => c.name === partnerName) || { name: partnerName };
    return { it, partner, same: partnerName === compName };
  }).sort((a, b) => ITEM_STATS[a.it.name].avg - ITEM_STATS[b.it.name].avg);
}

                <div className="col" style={{ gap: 4 }}><span className="muted" style={{ fontSize: 10 }}>종류</span><Seg options={[{ v: 'all', label: '전체' }, { v: '특성', label: '🔗 특성' }, { v: '일반', label: '일반' }]} value={kind} onChange={setKind} /></div>
              </div>
              <div className="search" style={{ maxWidth: 200 }}><Icon name="search" size={15} className="ico" /><input value={q} placeholder="증강체 검색" onChange={(e) => setQ(e.target.value)} /></div>
            </div>
            <div className="muted" style={{ fontSize: 11, marginTop: 8 }}>큐레이션 티어 분류 {tiered}종 · 나머지는 미분류(통계 비공개). 정렬: 티어순.</div>
          </div>
          <Card pad={false}>
            <table className="table">
              <thead><tr><th>티어</th><th>증강체</th><th>종류</th></tr></thead>
              <tbody>
                {list.map((a) => (
                  <tr key={a.apiName} className="clickable" onClick={() => setSel(a)}>
                    <td>{a.tier ? <span className="tier" style={{ background: AUG_TIER_C[a.tier] || 'var(--bg-elevated)', minWidth: 32, color: a.tier === 'C' ? '#fff' : '#0b0f1a' }}>{a.tier}</span> : <span className="muted" style={{ fontSize: 11 }}>미분류</span>}</td>
                    <td><div className="row" style={{ gap: 8 }}>{a.img ? <ItemImg item={a} size={28} /> : null}<b style={{ fontSize: 12.5 }}>{a.name}</b></div></td>
                    <td><span className="chip" style={{ height: 20, fontSize: 10.5 }}>{KIND_ICON[a.kind]} {a.kind}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
            {list.length === 0 && <Empty title="조건에 맞는 증강체가 없어요" />}
          </Card>
        </div>
      )}

      {tab === 'gods' && <GodsView onSel={setSel} />}

      <Modal open={!!sel} onClose={() => setSel(null)} title={sel && sel.name}>
        {sel && (
          <div className="grid" style={{ gap: 14 }}>
            <div className="row" style={{ gap: 14 }}>
              {sel.img && <ItemImg item={sel} size={56} />}
              <div className="col" style={{ gap: 6 }}>
                <b style={{ fontSize: 18 }}>{sel.name}</b>
                {sel.s && <div className="row" style={{ gap: 6 }}>{sel.tier ? <span className="tier" style={{ background: AUG_TIER_C[sel.tier] || 'var(--bg-elevated)', color: sel.tier === 'C' ? '#fff' : '#0b0f1a' }}>{sel.tier}티어</span> : <span className="chip">미분류</span>}{sel.kind && <span className="chip">{KIND_ICON[sel.kind]} {sel.kind}</span>}</div>}
                {sel.god && <div className="row" style={{ gap: 6 }}><span className="chip">🌟 {sel.god}의 가호</span>{sel.tier && <span className="chip" style={{ fontSize: 10.5 }}>{sel.tier}</span>}</div>}
              </div>
            </div>
            {sel.desc && <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>{sel.desc}</div>}
            {sel.s && <div className="muted" style={{ fontSize: 11.5 }}>※ 증강 승률·평균등수는 Riot 정책상 비공개입니다. 큐레이션 티어({sel.tier || '미분류'})만 제공됩니다.</div>}
          </div>
        )}
      </Modal>
    </div>
  );
}

function GodsView({ onSel }) {
  const gods = useMemo(() => (typeof GODS !== 'undefined' ? GODS : []).map((g) => ({ ...g, s: GOD_STATS[g.key] })).sort((a, b) => a.s.avg - b.s.avg), []);
  const total = gods.reduce((s, g) => s + g.blessings.length, 0);
  if (gods.length === 0) return <Empty icon="augments" title="신들의 가호 데이터가 없어요" />;
  return (
    <div className="grid" style={{ gap: 14 }}>
      <div className="why"><span className="why-label">우주의 신들</span>신 {gods.length}명 · 가호 총 <b>{total}종</b>. 신을 선택해 그 신의 <b>가호(은총)</b>를 단계별로 고르는 게 핵심 — 신별 컨셉과 가호 목록을 정리했어. (선호도 순)</div>
      <div className="grid" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(380px, 1fr))', gap: 14, alignItems: 'start' }}>
        {gods.map((g, i) => (
          <Card key={g.key} pad className="fade-in">
            <div className="row between" style={{ marginBottom: 10 }}>
              <div className="row" style={{ gap: 11 }}>
                <ChampIcon champ={{ name: g.name, cost: 5, img: { square: g.img } }} size={50} />
                <div className="col" style={{ gap: 3 }}>
                  <div className="row" style={{ gap: 7 }}><span className="muted tnum" style={{ fontSize: 12, fontWeight: 800, color: i === 0 ? 'var(--tier-s)' : 'var(--text-muted)' }}>#{i + 1}</span><b style={{ fontSize: 15 }}>{g.name}</b></div>
                  <span className="chip" style={{ height: 18, fontSize: 10 }}>가호 {g.blessings.length}종</span>
                </div>
              </div>
              <div className="col" style={{ alignItems: 'flex-end' }}><span className="muted" style={{ fontSize: 10 }}>추천 순위</span><b className="tnum" style={{ fontSize: 15, color: i === 0 ? 'var(--tier-s)' : 'var(--indigo-300)' }}>#{i + 1}</b></div>
            </div>
            {g.theme && <div className="why" style={{ fontSize: 11.5, marginBottom: 10 }}>{g.theme}</div>}
            <div className="grid" style={{ gap: 6 }}>
              {g.blessings.map((b, bi) => (
                <div key={b.name + bi} className="row card pad hover" style={{ gap: 10, padding: '7px 10px', cursor: 'pointer', alignItems: 'flex-start' }}
                  onClick={() => onSel({ name: b.name, desc: b.effect, img: b.img, god: g.name, tier: b.tier })}>
                  {b.img ? <ItemImg item={b} size={28} /> : <span style={{ width: 28, height: 28, borderRadius: 6, background: 'var(--bg-elevated)', display: 'grid', placeItems: 'center', flex: '0 0 auto', color: 'var(--indigo-400)' }}>✦</span>}
                  <div className="col" style={{ minWidth: 0, gap: 2, flex: 1 }}>
                    <div className="row between" style={{ gap: 6 }}><b style={{ fontSize: 12.5 }}>{b.name}</b>{b.tier && <span className="muted" style={{ fontSize: 9.5, whiteSpace: 'nowrap' }}>{b.tier}</span>}</div>
                    {b.effect && <span className="muted" style={{ fontSize: 11, lineHeight: 1.45 }}>{b.effect}</span>}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}
