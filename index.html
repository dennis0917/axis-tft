/* ============================================================
   45-builder — drag/click board + live synergy + combat sim
   (hero feature #3)
   ============================================================ */
const ROWS = [3, 2, 1, 0]; // render front(3)->back(0)
const COLS = [0, 1, 2, 3, 4, 5, 6];

function BuilderPage() {
  const ds = useDS();
  const { query } = useRouter();
  const [board, setBoard] = useState({}); // "r,c" -> {champ, star, items:[]}
  const [selCell, setSelCell] = useState(null);
  const [dragChamp, setDragChamp] = useState(null);
  const [tab, setTab] = useState('all');
  const [q, setQ] = useState('');
  const [level, setLevel] = useState(8);
  const [stage, setStage] = useState('4-2');
  const [sim, setSim] = useState(null);
  const [showHeat, setShowHeat] = useState(false);

  // load comp from store (from meta "빌더에서 열기")
  useEffect(() => {
    const cid = store.get('builderComp', null);
    if (cid) {
      const comp = COMPS.find((c) => c.id === cid);
      if (comp) {
        const b = {};
        comp.core.forEach((c) => { const p = comp.positions[c.key]; if (p) b[p.row + ',' + p.col] = { champ: c, star: c === comp.carry ? 2 : (c.cost <= 2 ? 2 : 1), items: c === comp.carry ? comp.items.slice(0, 3) : [] }; });
        setBoard(b);
      }
      store.set('builderComp', null);
      if (query.includes('sim=1')) setTimeout(() => runSim(b), 400);
    }
  }, []);

  // keep the right-panel selection valid when a unit moves/leaves its cell
  useEffect(() => { if (selCell && !board[selCell]) setSelCell(null); }, [board, selCell]);

  const placed = useMemo(() => Object.entries(board).map(([k, v]) => ({ ...v, row: +k.split(',')[0], col: +k.split(',')[1] })), [board]);
  const traits = useMemo(() => activeTraits(placed.map((p) => p.champ)), [placed]);

  function placeAt(r, c, champ) {
    if (!champ) return;
    setBoard((b) => {
      const next = { ...b };
      // if champ already on board, move it
      for (const k of Object.keys(next)) if (next[k].champ.key === champ.key) delete next[k];
      next[r + ',' + c] = { champ, star: champ.cost <= 2 ? 2 : 1, items: [] };
      return next;
    });
  }
  function removeAt(r, c) { setBoard((b) => { const n = { ...b }; delete n[r + ',' + c]; return n; }); if (selCell === r + ',' + c) setSelCell(null); }
  function cycleStar(k) { setBoard((b) => { if (!b[k]) return b; return { ...b, [k]: { ...b[k], star: (b[k].star % 3) + 1 } }; }); }
  function addItem(k, item) { setBoard((b) => { const u = b[k]; if (!u || u.items.length >= 3 || u.items.find((i) => i.name === item.name)) return b; return { ...b, [k]: { ...u, items: [...u.items, item] } }; }); }
  function rmItem(k, idx) { setBoard((b) => { const u = b[k]; if (!u) return b; return { ...b, [k]: { ...u, items: u.items.filter((_, i) => i !== idx) } }; }); }

  function runSim(b = board) {
    const arr = Object.entries(b).map(([k, v]) => ({ ...v, row: +k.split(',')[0], col: +k.split(',')[1] }));
    ds.simulate(arr, { level, stage }).then(setSim);
  }

  const trayList = RAW.champions.filter((c) => (tab === 'all' || c.cost === +tab) && (!q || c.name.includes(q)));
  const selUnit = selCell && board[selCell] ? board[selCell] : null;

  return (
    <div className="page">
      <PageHead title="덱 빌더 · 전투 시뮬레이터"
        sub="드래그나 클릭으로 판을 짜면 시너지가 실시간으로 뜨고, '이 보드가 실제로 이기나'를 전투로 예측합니다."
        right={<div className="row" style={{ gap: 8 }}><button className="btn ghost sm" onClick={() => { setBoard({}); setSim(null); }}>비우기</button><button className="btn" onClick={runSim}><Icon name="flask" size={15} />전투 시뮬레이션</button></div>} />

      <div className="two-pane r">
        {/* LEFT: board + tray */}
        <div className="grid" style={{ gap: 14 }}>
          <div className="board-wrap">
            <div className="row between" style={{ marginBottom: 10 }}>
              <div className="row" style={{ gap: 8 }}>
                <span className="chip">{placed.length} / {level} 유닛</span>
                <span className="muted" style={{ fontSize: 11 }}>↑ 앞라인(적 방향) · ↓ 뒷라인(내 쪽)</span>
              </div>
              <label className="row" style={{ gap: 6, fontSize: 12, cursor: 'pointer' }}><input type="checkbox" checked={showHeat} onChange={(e) => setShowHeat(e.target.checked)} />포지션 히트맵</label>
            </div>
            <div className="hexgrid">
              {ROWS.map((r) => (
                <div className={cx('hexrow', r % 2 === 1 && 'odd')} key={r}>
                  {COLS.map((c) => {
                    const k = r + ',' + c; const cell = board[k];
                    const h = showHeat && sim ? sim.heat[r][c] : 0;
                    return (
                      <div key={c} className={cx('hex', cell && 'filled', selCell === k && 'drop')}
                        style={{ background: showHeat && sim ? `rgba(99,102,241,${0.12 + h * 0.7})` : undefined }}
                        onClick={() => cell ? setSelCell(k) : (dragChamp && (placeAt(r, c, dragChamp), setDragChamp(null)))}
                        onDragOver={(e) => e.preventDefault()}
                        onDrop={(e) => { e.preventDefault(); if (dragChamp) { placeAt(r, c, dragChamp); setDragChamp(null); } }}>
                        {cell && <>
                          {cell.champ.img?.square ? <img src={cell.champ.img.square} alt="" /> : <div className="unit ph" style={{ width: '100%', height: '100%' }}>{cell.champ.name.slice(0, 2)}</div>}
                          <div className="hxcost" style={{ '--cc': COST_COLOR[cell.champ.cost] }} />
                          <div className="hxstar" onClick={(e) => { e.stopPropagation(); cycleStar(k); }} title="별 변경">{'★'.repeat(cell.star)}</div>
                          {cell.items.length > 0 && <div className="hxitems">{cell.items.map((it, i) => <img key={i} src={it.img} alt="" />)}</div>}
                          <div className="hxrm" onClick={(e) => { e.stopPropagation(); removeAt(r, c); }}>×</div>
                        </>}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>

          {/* tray */}
          <Card title="챔피언 (드래그하거나 칸을 눌러 배치)" icon="champions"
            right={<div className="search" style={{ maxWidth: 160 }}><Icon name="search" size={14} className="ico" /><input value={q} placeholder="검색" onChange={(e) => setQ(e.target.value)} /></div>}>
            <div className="row wrap" style={{ gap: 6, marginBottom: 10 }}>
              <Seg options={[{ v: 'all', label: '전체' }, ...[1, 2, 3, 4, 5].map((c) => ({ v: String(c), label: c + '코' }))]} value={tab} onChange={setTab} />
              {dragChamp && <span className="chip solid">선택됨: {dragChamp.name} → 칸 클릭</span>}
            </div>
            <div className="tray">
              {trayList.map((c) => (
                <div key={c.key} draggable onDragStart={() => setDragChamp(c)} onClick={() => setDragChamp(dragChamp?.key === c.key ? null : c)}
                  style={{ cursor: 'grab', opacity: dragChamp && dragChamp.key !== c.key ? 0.6 : 1 }}>
                  <ChampIcon champ={c} size={50} />
                </div>
              ))}
            </div>
          </Card>
        </div>

        {/* RIGHT: synergy + selected unit + sim result */}
        <div className="grid" style={{ gap: 14, position: 'sticky', top: 74 }}>
          <Card title="활성 시너지 (특성)" icon="augments">
            {traits.length === 0 ? <div className="muted" style={{ fontSize: 12 }}>유닛을 올리면 시너지가 여기 표시됩니다.</div> :
              traits.map((t) => (
                <div key={t.name} style={{ padding: '6px 0', borderBottom: '1px solid var(--border)' }}>
                  <div className="row between" style={{ marginBottom: 5 }}>
                    <div className="row" style={{ gap: 6 }}>
                      {t.img ? <img src={t.img} alt="" style={{ width: 16, height: 16, filter: t.on ? 'none' : 'grayscale(1) opacity(.5)' }} /> : null}
                      <span style={{ fontSize: 12.5, fontWeight: 700, color: t.on ? 'var(--text-primary)' : 'var(--text-muted)' }}>{t.name}</span>
                    </div>
                    <b className="tnum" style={{ fontSize: 12.5, color: t.on ? TRAIT_STYLE[t.style]?.c : 'var(--text-muted)' }}>{t.count}{t.next ? ` / ${t.next}` : ''}</b>
                  </div>
                  <Bar v={t.count} max={t.next || t.active} cls={t.on ? 'pos' : ''} />
                </div>
              ))}
          </Card>

          {selUnit ? (
            <Card title={`${selUnit.champ.name} · 아이템`} icon="items" right={<span className="btn ghost sm" onClick={() => setSelCell(null)}><Icon name="x" size={14} /></span>}>
              <div className="row" style={{ gap: 6, marginBottom: 10 }}>
                {[0, 1, 2].map((i) => (
                  <div key={i} className="titem" style={{ width: 36, height: 36 }} onClick={() => selUnit.items[i] && rmItem(selCell, i)} title={selUnit.items[i]?.name || '빈 슬롯'}>
                    {selUnit.items[i] && <img src={selUnit.items[i].img} alt="" />}
                  </div>
                ))}
                <div className="spacer" /><button className="btn ghost sm" onClick={() => cycleStar(selCell)}>{'★'.repeat(selUnit.star)}</button>
              </div>
              <div className="muted" style={{ fontSize: 11, marginBottom: 6 }}>추천 정템 (클릭해서 추가)</div>
              <div className="row wrap" style={{ gap: 5 }}>
                {CHAMP_STATS[selUnit.champ.key].items.map((it) => <span key={it.name} className="row card pad" style={{ gap: 5, padding: '4px 7px', cursor: 'pointer' }} onClick={() => addItem(selCell, it)}><ItemImg item={it} size={22} /><span style={{ fontSize: 11 }}>{it.name}</span></span>)}
              </div>
            </Card>
          ) : (
            <Card title="컨텍스트" icon="coin">
              <div className="row" style={{ gap: 10 }}>
                <div className="col" style={{ flex: 1, gap: 4 }}><span className="muted" style={{ fontSize: 11 }}>레벨</span><Seg options={[6, 7, 8, 9, 10].map((l) => ({ v: l, label: String(l) }))} value={level} onChange={setLevel} /></div>
              </div>
              <div className="col" style={{ gap: 4, marginTop: 10 }}><span className="muted" style={{ fontSize: 11 }}>스테이지</span><Seg options={['3-2', '4-2', '5-1', '6-1'].map((s) => ({ v: s, label: s }))} value={stage} onChange={setStage} /></div>
              <div className="muted" style={{ fontSize: 11, marginTop: 10 }}>칸 위 유닛을 누르면 아이템·별을 편집할 수 있어요.</div>
            </Card>
          )}

          {sim && (
            <Card title="전투 시뮬레이션 결과" icon="flask" className="fade-in">
              <div className="row" style={{ gap: 8, marginBottom: 12 }}>
                <div className="statbox" style={{ flex: 1 }}><div className="k">예상 등수</div><div className="v" style={{ color: sim.expectedPlacement <= 4 ? 'var(--pos)' : 'var(--warn)' }}>{sim.expectedPlacement.toFixed(1)}</div></div>
                <div className="statbox" style={{ flex: 1 }}><div className="k">평균 보드 대비 승률</div><div className="v" style={{ color: sim.winVsAvg >= 50 ? 'var(--pos)' : 'var(--neg)' }}>{sim.winVsAvg}<small>%</small></div></div>
              </div>
              <div className="kv"><span className="k">팀 DPS</span><span className="v">{fmt.int(sim.teamDps)}</span></div>
              <div className="kv"><span className="k">앞라인 유효체력</span><span className="v">{fmt.int(sim.frontlineEHP)}</span></div>
              <div className="kv"><span className="k">시너지 보정</span><span className="v">×{sim.traitMult.toFixed(2)}</span></div>
              <Gauge v={sim.winVsAvg} />
              {sim.perRound && (
                <div style={{ marginTop: 14 }}>
                  <div className="muted" style={{ fontSize: 11, fontWeight: 600, marginBottom: 7 }}>라운드별 전투 승률 (스테이지별 평균 로비 대비)</div>
                  <div className="row" style={{ alignItems: 'flex-end', gap: 6, height: 76 }}>
                    {sim.perRound.map((p) => (
                      <div key={p.stage} className="col tip" style={{ flex: 1, alignItems: 'center', gap: 3 }}>
                        <span className="tnum" style={{ fontSize: 10, color: p.winRate >= 50 ? 'var(--pos)' : 'var(--neg)' }}>{p.winRate}</span>
                        <div style={{ width: '100%', height: Math.max(3, p.winRate * 0.5), background: p.winRate >= 55 ? 'var(--pos)' : p.winRate >= 45 ? 'var(--warn)' : 'var(--neg)', borderRadius: '3px 3px 0 0', transition: 'height .4s var(--ease)' }} />
                        <span className="muted" style={{ fontSize: 9.5 }}>{p.stage}스</span>
                        <span className="tip-body">{p.stage}스테이지 평균 로비 대비 승률 {p.winRate}% · 패배 시 예상 체력손실 {p.hpLoss}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <Why label="시뮬레이션 해석">{sim.winVsAvg >= 60 ? '평균 로비 보드보다 확실히 셈. 이대로 가면 고점 보는 각.' : sim.winVsAvg >= 45 ? '평균 수준. 아이템 한 개나 별 하나 더 올리면 순방 안정권.' : '평균 보드한테 짐. 앞라인이 약하거나 캐리 별/템이 모자람 — 보강 필요.'} 막대는 스테이지가 오를수록 평균 로비가 강해져 내 보드의 승률이 어떻게 떨어지는지 보여줘 — 꺾이는 구간이 보강 타이밍.</Why>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   46-coach — live state-aware decision engine (hero feature #1)
   ============================================================ */
const COACH_PRESETS = [
  { label: '4-1 · 50골드 · 패스트8 각', s: { gold: 52, hp: 64, level: 7, stage: '4-1', contest: 1, boardStrength: 0.5, components: 1 } },

  { label: '이자 라인 채우기', s: { gold: 34, hp: 78, level: 7, stage: '3-5', contest: 0, boardStrength: 0.6, components: 1 } },
];

function CoachPage() {
  const ds = useDS();
  const [st, setSt] = useState({ gold: 50, hp: 70, level: 7, stage: '4-1', contest: 1, boardStrength: 0.5, components: 1, targetKey: '' });
  const [adv, setAdv] = useState(null);
  const [hintMode, setHintMode] = useState(false);
  const set = (k, v) => setSt((s) => ({ ...s, [k]: v }));
  const targetUnit = st.targetKey ? champByKey[st.targetKey]?.name : null;

  useEffect(() => {
    let alive = true;
    ds.recommend({ ...st, targetUnit }).then((a) => { if (alive) setAdv(a); });
    return () => { alive = false; };
  }, [st]);

  // board context for augment trait-fit: if a target carry is set, use its comp's core
  const adviceBoard = useMemo(() => {
    if (!targetUnit) return [];
    const c = COMPS.find((cc) => cc.carry.name === targetUnit || cc.core.some((u) => u.name === targetUnit));
    return c ? c.core.map((u) => ({ champ: u })) : [];
  }, [targetUnit]);

  // lobby prediction (mock): pick a few comps as opponents' likely finals + flag contest with my target
  const lobby = useMemo(() => {
    const arr = COMPS.slice(0, 7).map((c, i) => ({ name: c.name, carry: c.carry, threat: rand('lob' + i + st.stage, 0.3, 0.95), contestMine: targetUnit && c.core.some((u) => u.name === targetUnit) }));
    return arr.sort((a, b) => b.threat - a.threat);
  }, [st.stage, targetUnit]);

  return (
    <div className="page">
      <PageHead title="AI 실시간 코치"
        sub="지금 내 상태를 넣으면 '다음 한 수'를 이유까지 딱 한 줄로. MetaTFT가 못 하는 실시간 의사결정."
        right={<label className="row" style={{ gap: 7, fontSize: 12.5, cursor: 'pointer', background: hintMode ? 'var(--indigo-soft)' : 'transparent', padding: '6px 10px', borderRadius: 8, border: '1px solid var(--border)' }}>
          <input type="checkbox" checked={hintMode} onChange={(e) => setHintMode(e.target.checked)} />보조바퀴 빼기 (힌트만)</label>} />

      <div className="row wrap" style={{ gap: 8, marginBottom: 14 }}>
        <span className="muted" style={{ fontSize: 12, alignSelf: 'center' }}>빠른 상황:</span>
        {COACH_PRESETS.map((p) => <button key={p.label} className="btn ghost sm" onClick={() => setSt((s) => ({ ...s, ...p.s }))}>{p.label}</button>)}
      </div>

      <LiveOverlay />
      <LiveCapture onRead={(vals) => setSt((s) => ({ ...s, ...vals }))} />

      <div className="two-pane l">
        {/* inputs */}
        <Card title="현재 상태 입력" icon="coin">
          <Field label="골드"><Stepper value={st.gold} min={0} max={120} step={1} onChange={(v) => set('gold', v)} suffix="G" /></Field>
          <div className="row" style={{ gap: 6, margin: '2px 0 10px' }}>{[0, 10, 20, 30, 40, 50].map((g) => <button key={g} className={cx('btn ghost sm', st.gold === g && 'on')} style={{ flex: 1, padding: 0 }} onClick={() => set('gold', g)}>{g}</button>)}</div>
          <Field label="체력 (HP)"><Stepper value={st.hp} min={1} max={100} step={1} onChange={(v) => set('hp', v)} /></Field>
          <Field label="레벨"><Seg options={[4, 5, 6, 7, 8, 9, 10].map((l) => ({ v: l, label: String(l) }))} value={st.level} onChange={(v) => set('level', v)} /></Field>
          <Field label="스테이지"><Seg options={['2-5', '3-2', '3-5', '4-1', '4-3', '5-1', '6-1'].map((s) => ({ v: s, label: s }))} value={st.stage} onChange={(v) => set('stage', v)} /></Field>
          <Field label="노리는 캐리 (선택)">
            <select className="input" style={{ width: '100%' }} value={st.targetKey} onChange={(e) => set('targetKey', e.target.value)}>
              <option value="">— 없음 —</option>
              {RAW.champions.filter((c) => c.cost <= 4).map((c) => <option key={c.key} value={c.key}>{c.name} ({c.cost}코)</option>)}
            </select>
          </Field>
          <Field label={`경합 (나 말고 ${st.contest}명)`}><Seg options={[0, 1, 2, 3].map((c) => ({ v: c, label: c + '명' }))} value={st.contest} onChange={(v) => set('contest', v)} /></Field>
          <Field label="현재 보드 강함"><input type="range" min="0" max="1" step="0.05" value={st.boardStrength} onChange={(e) => set('boardStrength', +e.target.value)} style={{ width: '100%' }} /><div className="row between"><span className="muted" style={{ fontSize: 10 }}>약함(말림)</span><span className="muted" style={{ fontSize: 10 }}>강함(고점)</span></div></Field>
          <Field label="벤치 조합템 수"><Stepper value={st.components} min={0} max={9} step={1} onChange={(v) => set('components', v)} /></Field>
        </Card>

        {/* output */}
        <div className="grid" style={{ gap: 14 }}>
          {adv && (hintMode ? (
            <Card title="🚲 보조바퀴 빼기 — 스스로 읽어보기" icon="brain" className="fade-in">
              <div className="why" style={{ fontSize: 14, padding: '14px 16px' }}>
                지금 <b>{st.stage}, {st.level}렙, {st.gold}골드, 체력 {st.hp}</b>{targetUnit ? `, ${targetUnit} 경합 ${st.contest}명` : ''}.<br />
                스스로 물어봐: <b>① 이번 라운드 안 죽나?</b> <b>② 이자(50) 깨도 될 만큼 급한가?</b> <b>③ {targetUnit || '핵심 유닛'} 지금 굴려서 뜰 확률이 골드값을 하나?</b>
              </div>
              <div className="muted" style={{ fontSize: 12, marginTop: 10 }}>정답을 바로 주는 대신 판단 근육을 키우는 모드입니다. 막히면 체크 해제하고 정답을 확인하세요.</div>
              <details style={{ marginTop: 10 }}><summary style={{ cursor: 'pointer', fontSize: 12.5, color: 'var(--indigo-300)', fontWeight: 700 }}>정답 살짝 보기</summary><div className="why" style={{ marginTop: 8 }}>{adv.action} — {adv.why}</div></details>
            </Card>
          ) : (
            <Card className="fade-in" pad>
              <div className="row" style={{ gap: 10, marginBottom: 6 }}>
                <div style={{ width: 40, height: 40, borderRadius: 10, background: 'var(--indigo-500)', display: 'grid', placeItems: 'center', color: '#fff', flex: '0 0 auto' }}><Icon name="bolt" size={22} /></div>
                <div className="col">
                  <span className="muted" style={{ fontSize: 11, fontWeight: 700 }}>다음 한 수</span>
                  <b style={{ fontSize: 18, lineHeight: 1.25 }}>{adv.action}</b>
                </div>
              </div>
              <Why label="이유">{adv.why}</Why>
              {adv.econNote && <div className="why" style={{ borderLeftColor: 'var(--warn)', marginTop: 8, color: 'var(--warn)' }}>{adv.econNote}</div>}
              <div className="row wrap" style={{ gap: 6, marginTop: 10 }}>{adv.tags.map((t) => <span key={t} className="chip">{t}</span>)}</div>
            </Card>
          ))}

          {adv && (
            <div className="grid cols-2" style={{ gap: 14 }}>
              <Card title="승률 · 로비 난이도" icon="target">
                <Gauge v={adv.winChance} label="이번 라운드 승리 확률" />
                <div className="row between" style={{ marginTop: 12 }}>
                  <span className="sec" style={{ fontSize: 12 }}>로비 난이도</span>
                  <span className={cx('chip', adv.lobbyDifficulty === 'hard' ? 'delta-down' : adv.lobbyDifficulty === 'easy' ? 'delta-up' : '')}>{adv.lobbyDifficulty === 'hard' ? '빡셈 (강팟)' : adv.lobbyDifficulty === 'easy' ? '할 만함' : '보통'}</span>
                </div>
              </Card>
              <Card title="갈아타기 트리" icon="builder">
                {adv.pivotTree.map((p) => (
                  <div key={p.cond} className="why" style={{ borderLeftColor: p.good ? 'var(--pos)' : 'var(--warn)', marginBottom: 8 }}>
                    <div style={{ fontWeight: 700, fontSize: 12, color: p.good ? 'var(--pos)' : 'var(--warn)' }}>{p.cond}</div>
                    <div style={{ fontSize: 12, marginTop: 2 }}>{p.line} <span className="muted">· {p.place}</span></div>
                  </div>
                ))}
              </Card>
            </div>
          )}

          {/* augment + god choice helpers */}
          <div className="grid cols-2" style={{ gap: 14 }}>
            <AugChoiceHelper board={adviceBoard} />
            <GodChoiceHelper />
          </div>

          {/* lobby prediction */}
          <Card title="로비 예측 · 정찰" icon="search">
            <div className="muted" style={{ fontSize: 12, marginBottom: 10 }}>상대들이 갈 것 같은 최종 덱 예측. {targetUnit ? `내 캐리(${targetUnit})와 겹치는 집은 빨간 깃발.` : '캐리를 지정하면 경합 집을 표시합니다.'}</div>
            <div className="grid" style={{ gridTemplateColumns: 'repeat(auto-fill,minmax(180px,1fr))', gap: 8 }}>
              {lobby.map((o) => (
                <div key={o.name} className="row between card pad" style={{ padding: '8px 10px', borderColor: o.contestMine ? 'var(--neg)' : undefined }}>
                  <div className="row" style={{ gap: 8, minWidth: 0 }}><ChampIcon champ={o.carry} size={30} /><span style={{ fontSize: 12, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{o.name}</span></div>
                  {o.contestMine ? <span className="chip delta-down" style={{ height: 18 }}>경합!</span> : <span className="muted tnum" style={{ fontSize: 11 }}>위협 {(o.threat * 100).toFixed(0)}</span>}
                </div>
              ))}
            </div>
          </Card>

          <AiDeepCoach st={st} targetUnit={targetUnit} lobby={lobby} />
        </div>
      </div>
    </div>
  );
}

/* AI 심층 코칭 — 현재 상태 전체를 LLM에 보내 '그때그때' 동적 진단(고정 템플릿 아님). 온디맨드(버튼)로 호출. */
function AiDeepCoach({ st, targetUnit, lobby }) {
  const ds = useDS();
  const [adv, setAdv] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const targetComp = useMemo(() => targetUnit ? (COMPS.find((c) => c.carry.name === targetUnit) || COMPS.find((c) => c.core.some((u) => u.name === targetUnit))) : null, [targetUnit]);
  const ask = () => {
    setLoading(true); setErr(null);
    const comp = targetComp ? { name: targetComp.name, tier: targetComp.tier, level: targetComp.level, core: targetComp.core.map((u) => u.name), items: (targetComp.items || []).map((i) => i.name) } : null;
    ds.aiCoach({ ...st, targetUnit, lobby, comp }).then((a) => {
      if (a && a.move) setAdv(a); else setErr('AI 응답을 받지 못했어요 — LLM 키/일일 한도를 확인하세요. (위의 규칙 기반 ‘다음 한 수’는 항상 동작합니다)');
    }).catch(() => setErr('AI 호출 실패')).finally(() => setLoading(false));
  };
  return (
    <Card title="🧠 AI 심층 코칭" icon="brain" right={adv && adv.model ? <span className="chip" style={{ height: 18, fontSize: 9.5 }}>{adv.model}</span> : null}>
      <div className="row between wrap" style={{ gap: 10, marginBottom: adv || err ? 12 : 0 }}>
        <div className="muted" style={{ fontSize: 12, flex: 1, minWidth: 180 }}>
          위 ‘다음 한 수’는 즉답용 규칙 엔진입니다. <b>지금 상황 전체</b>(골드·체력·레벨·스테이지·경합·로비)를 AI에게 보내 사람 코치처럼 풀어서 진단받으세요.
        </div>
        <button className="btn" onClick={ask} disabled={loading}>{loading ? <Fragment><span className="spin" />분석 중…</Fragment> : <Fragment><Icon name="bolt" size={15} />지금 상황 AI에게 묻기</Fragment>}</button>
      </div>
      {err && <div className="why" style={{ borderLeftColor: 'var(--warn)', color: 'var(--warn)', fontSize: 12 }}>{err}</div>}
      {adv && (
        <div className="grid" style={{ gap: 10 }}>
          {adv.read && <div className="muted" style={{ fontSize: 12.5, fontStyle: 'italic' }}>“{adv.read}”</div>}
          <div className="row" style={{ gap: 10 }}>
            <div style={{ width: 38, height: 38, borderRadius: 10, background: 'var(--indigo-500)', display: 'grid', placeItems: 'center', color: '#fff', flex: '0 0 auto' }}><Icon name="bolt" size={20} /></div>
            <div className="col"><span className="muted" style={{ fontSize: 11, fontWeight: 700 }}>AI 추천 한 수</span><b style={{ fontSize: 16, lineHeight: 1.3 }}>{adv.move}</b></div>
          </div>
          <Why label="이유">{adv.why}</Why>
          {adv.risk && <div className="why" style={{ borderLeftColor: 'var(--warn)' }}><b style={{ color: 'var(--warn)', fontSize: 11.5 }}>주의</b><div style={{ fontSize: 12.5, marginTop: 2 }}>{adv.risk}</div></div>}
          {adv.alt && <div className="why" style={{ borderLeftColor: 'var(--pos)' }}><b style={{ color: 'var(--pos)', fontSize: 11.5 }}>안 풀리면</b><div style={{ fontSize: 12.5, marginTop: 2 }}>{adv.alt}</div></div>}
        </div>
      )}
    </Card>
  );
}

/* 증강 선택 도우미 — 제시된 증강 3개를 넣으면 순방 기준으로 순위 (augmentAdvice) */
function AugChoiceHelper({ board }) {
  const [picks, setPicks] = useState(['', '', '']);
  const names = useMemo(() => RAW.augments.map((a) => a.name).sort((a, b) => a.localeCompare(b, 'ko')), []);
  const offered = picks.filter(Boolean);
  const ranked = offered.length ? augmentAdvice(offered, board) : [];
  const setPick = (i, v) => setPicks((p) => { const q = [...p]; q[i] = v; return q; });
  const kindMark = (k) => (k === '은총' ? '🌟 ' : k === '특성' ? '🔗 ' : '◆ ');
  return (
    <Card title="증강 선택 도우미" icon="augments">
      <div className="muted" style={{ fontSize: 12, marginBottom: 10 }}>증강 3개 중 뭘 고를지 막힐 때 — 제시된 증강을 넣으면 순방률 기준으로 순위를 매겨줍니다{board && board.length ? ' (지금 시너지 반영)' : ''}.</div>
      <div className="grid" style={{ gap: 8 }}>
        {[0, 1, 2].map((i) => (
          <div key={i} className="row" style={{ gap: 8 }}>
            <span className="chip" style={{ minWidth: 22, justifyContent: 'center' }}>{i + 1}</span>
            <select className="input" style={{ flex: 1 }} value={picks[i]} onChange={(e) => setPick(i, e.target.value)}>
              <option value="">— 제시된 증강 선택 —</option>
              {names.map((n) => <option key={n} value={n}>{n}</option>)}
            </select>
          </div>
        ))}
      </div>
      {ranked.length > 0 ? (
        <div className="grid" style={{ gap: 7, marginTop: 12 }}>
          {ranked.map((r, i) => (
            <div key={r.name} className="row between" style={{ padding: '9px 11px', borderRadius: 9, border: '1px solid var(--border)', background: i === 0 ? 'var(--indigo-soft)' : 'transparent' }}>
              <div className="row" style={{ gap: 9, minWidth: 0 }}>
                {i === 0 ? <span className="chip solid" style={{ height: 20 }}>추천</span> : <span className="muted tnum" style={{ width: 18, textAlign: 'center' }}>{i + 1}</span>}
                <div className="col" style={{ minWidth: 0 }}>
                  <span style={{ fontSize: 12.5, fontWeight: i === 0 ? 800 : 600 }}>{kindMark(r.kind)}{r.name}</span>
                  {r.fit && <span className="chip" style={{ height: 16, fontSize: 9.5, background: 'var(--pos-soft)', color: 'var(--pos)', borderColor: 'transparent', alignSelf: 'flex-start', marginTop: 2 }}>{r.fit}</span>}
                </div>
              </div>
              <div className="row" style={{ gap: 12, flexShrink: 0 }}>
                <div className="col" style={{ alignItems: 'flex-end' }}><span className="muted" style={{ fontSize: 9 }}>평균</span><b className="tnum" style={{ fontSize: 12 }}>{fmt.place(r.avg)}</b></div>
                <div className="col" style={{ alignItems: 'flex-end' }}><span className="muted" style={{ fontSize: 9 }}>순방</span><b className="tnum" style={{ fontSize: 12, color: 'var(--pos)' }}>{fmt.pct(r.top4, 0)}</b></div>
              </div>
            </div>
          ))}
          <div className="why" style={{ fontSize: 12 }}>{ranked[0].fit ? `${ranked[0].name}은(는) 지금 시너지와 맞아서 1순위.` : `통계상 ${ranked[0].name}의 순방률이 가장 높음.`} 증강은 덱·골드 상황에 따라 달라지니 참고만 하세요.</div>
        </div>
      ) : <div className="muted" style={{ fontSize: 12, marginTop: 10 }}>제시된 증강을 1개 이상 선택하면 순위가 나옵니다.</div>}
    </Card>
  );
}

/* 신 가호 추천 — 순방 기여도(평균등수) 순 (godAdvice) */
function GodChoiceHelper() {
  const gods = useMemo(() => godAdvice().slice(0, 5), []);
  if (!gods.length) return null;
  return (
    <Card title="신 가호 추천" icon="sparkle">
      <div className="muted" style={{ fontSize: 12, marginBottom: 10 }}>이번 판 어떤 신을 고를지 — 순방 기여도(평균등수) 순. 신을 펼치면 핵심 가호를 보여줍니다.</div>
      <div className="grid" style={{ gap: 7 }}>
        {gods.map((g, i) => (
          <details key={g.key} style={{ border: '1px solid var(--border)', borderRadius: 9, padding: '8px 10px', background: i === 0 ? 'var(--indigo-soft)' : 'transparent' }}>
            <summary className="row between" style={{ cursor: 'pointer', listStyle: 'none' }}>
              <div className="row" style={{ gap: 9, minWidth: 0 }}>
                {g.img ? <img src={g.img} alt="" style={{ width: 28, height: 28, borderRadius: 7, objectFit: 'cover' }} /> : <span className="chip" style={{ width: 28, height: 28, justifyContent: 'center' }}>{g.name.slice(0, 2)}</span>}
                <div className="col" style={{ minWidth: 0 }}><span style={{ fontSize: 12.5, fontWeight: i === 0 ? 800 : 600 }}>{i === 0 ? '⭐ ' : ''}{g.name}</span><span className="muted" style={{ fontSize: 10 }}>가호 {(g.blessings || []).length}종</span></div>
              </div>
              <b className="tnum" style={{ fontSize: 12.5, flexShrink: 0 }}>{fmt.place(g.avg)}</b>
            </summary>
            <div className="row wrap" style={{ gap: 5, marginTop: 8 }}>
              {(g.blessings || []).slice(0, 6).map((b) => <span key={b.name} className="chip" style={{ height: 20, fontSize: 10.5 }}>{b.name}</span>)}
              {(!g.blessings || !g.blessings.length) && <span className="muted" style={{ fontSize: 11 }}>가호 데이터 없음</span>}
            </div>
          </details>
        ))}
      </div>
    </Card>
  );
}

function Field({ label, children }) { return <div style={{ marginBottom: 12 }}><div className="muted" style={{ fontSize: 11, fontWeight: 600, marginBottom: 5 }}>{label}</div>{children}</div>; }
function Stepper({ value, min, max, step = 1, onChange, suffix }) {
  return (
    <div className="row" style={{ gap: 6 }}>
      <button className="btn ghost sm" style={{ width: 32, padding: 0 }} onClick={() => onChange(Math.max(min, value - step))}>−</button>
      <div className="statbox" style={{ flex: 1, textAlign: 'center', padding: '6px 8px' }}><span className="v tnum" style={{ fontSize: 16 }}>{value}{suffix || ''}</span></div>
      <button className="btn ghost sm" style={{ width: 32, padding: 0 }} onClick={() => onChange(Math.min(max, value + step))}>+</button>
    </div>
  );
}

/* ============================================================
   LiveCapture — read the game screen in real time (beta)
   getDisplayMedia (screen share) → OCR gold/HP/level → auto-fill coach
   ============================================================ */
const TESS_URL = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
const clamp01 = (v, max) => Math.max(0, Math.min(max, v));
const DEFAULT_REGIONS = {
  level: { x: 0.255, y: 0.905, w: 0.035, h: 0.04, label: '레벨', color: '#818CF8' },
  gold: { x: 0.468, y: 0.905, w: 0.045, h: 0.04, label: '골드', color: '#FBBF24' },
  hp: { x: 0.038, y: 0.55, w: 0.04, h: 0.038, label: '체력', color: '#F87171' },
};

function LiveCapture({ onRead }) {
  const [open, setOpen] = useState(false);
  const [stream, setStream] = useState(null);
  const [running, setRunning] = useState(false);
  const [status, setStatus] = useState('');
  const [vals, setVals] = useState({});
  const [regions, setRegions] = useState(() => {
    const saved = store.get('liveRegions', null);
    return saved ? { level: { ...DEFAULT_REGIONS.level, ...saved.level }, gold: { ...DEFAULT_REGIONS.gold, ...saved.gold }, hp: { ...DEFAULT_REGIONS.hp, ...saved.hp } } : DEFAULT_REGIONS;
  });
  const videoRef = useRef(null);
  const boxWrapRef = useRef(null);
  const workerRef = useRef(null);
  const timerRef = useRef(null);
  const regionsRef = useRef(regions);
  regionsRef.current = regions;

  useEffect(() => { store.set('liveRegions', regions); }, [regions]);
  useEffect(() => () => { teardown(); }, []); // unmount cleanup
  useEffect(() => { if (stream && videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play().catch(() => {}); } }, [stream]);

  function teardown() {
    if (timerRef.current) clearInterval(timerRef.current);
    if (workerRef.current) { try { workerRef.current.terminate(); } catch (e) {} workerRef.current = null; }
    setStream((s) => { if (s) s.getTracks().forEach((t) => t.stop()); return null; });
    setRunning(false);
  }

  async function connect() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      setStatus('이 브라우저/환경에서는 화면 공유를 지원하지 않아요. npm run dev(localhost)에서 실행해 주세요.'); return;
    }
    try {
      const s = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 8 }, audio: false });
      s.getVideoTracks()[0].addEventListener('ended', () => teardown());
      setStream(s); setStatus("화면 연결됨. 박스를 골드/체력/레벨 숫자 위로 드래그해 맞춘 뒤 [읽기 시작].");
    } catch (e) { setStatus('화면 공유가 취소됐거나 차단됐어요.'); }
  }

  async function ensureWorker() {
    if (workerRef.current) return workerRef.current;
    if (!window.Tesseract) {
      setStatus('OCR 엔진 로딩 중… (최초 1회 CDN 다운로드, 수 초 걸릴 수 있어요)');
      await new Promise((res, rej) => { const sc = document.createElement('script'); sc.src = TESS_URL; sc.onload = res; sc.onerror = () => rej(new Error('Tesseract 로드 실패 (CDN 차단?)')); document.head.appendChild(sc); });
    }
    const w = await window.Tesseract.createWorker('eng');
    await w.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '7' });
    workerRef.current = w; return w;
  }

  async function readOnce() {
    const v = videoRef.current; if (!v || !v.videoWidth) return;
    let worker; try { worker = await ensureWorker(); } catch (e) { setStatus(String(e.message || e)); stop(); return; }
    const reg = regionsRef.current; const out = {};
    for (const key of ['gold', 'hp', 'level']) {
      const r = reg[key];
      const sx = Math.round(r.x * v.videoWidth), sy = Math.round(r.y * v.videoHeight);
      const sw = Math.max(8, Math.round(r.w * v.videoWidth)), sh = Math.max(8, Math.round(r.h * v.videoHeight));
      const scale = 4, cv = document.createElement('canvas'); cv.width = sw * scale; cv.height = sh * scale;
      const ctx = cv.getContext('2d');
      try { ctx.drawImage(v, sx, sy, sw, sh, 0, 0, cv.width, cv.height); } catch (e) { continue; }
      const img = ctx.getImageData(0, 0, cv.width, cv.height), px = img.data;
      for (let i = 0; i < px.length; i += 4) { const g = 0.299 * px[i] + 0.587 * px[i + 1] + 0.114 * px[i + 2]; const t = g > 135 ? 0 : 255; px[i] = px[i + 1] = px[i + 2] = t; }
      ctx.putImageData(img, 0, 0);
      try { const { data } = await worker.recognize(cv); const n = parseInt((data.text || '').replace(/\D/g, ''), 10); if (!isNaN(n)) out[key] = n; } catch (e) {}
    }
    setVals(out);
    const mapped = {};
    if (out.gold != null && out.gold <= 200) mapped.gold = Math.min(120, out.gold);
    if (out.hp != null && out.hp <= 100) mapped.hp = Math.max(1, out.hp);
    if (out.level != null && out.level >= 1 && out.level <= 10) mapped.level = out.level;
    if (Object.keys(mapped).length) { onRead(mapped); setStatus('자동 입력됨 ✓ ' + JSON.stringify(mapped)); }
    else setStatus('숫자를 못 읽었어요. 박스 위치/크기를 숫자에 더 정확히 맞춰보세요.');
  }
  function start() { if (running || !stream) return; setRunning(true); readOnce(); timerRef.current = setInterval(readOnce, 2000); }
  function stop() { setRunning(false); if (timerRef.current) clearInterval(timerRef.current); }

  function dragRegion(key, e, mode) {
    e.preventDefault(); e.stopPropagation();
    const wrap = boxWrapRef.current; if (!wrap) return;
    const rect = wrap.getBoundingClientRect();
    const r0 = { ...regionsRef.current[key] }, px = e.clientX, py = e.clientY;
    const move = (ev) => {
      const dx = (ev.clientX - px) / rect.width, dy = (ev.clientY - py) / rect.height;
      setRegions((R) => {
        const r = { ...R[key] };
        if (mode === 'move') { r.x = clamp01(r0.x + dx, 1 - r.w); r.y = clamp01(r0.y + dy, 1 - r.h); }
        else { r.w = Math.max(0.02, clamp01(r0.w + dx, 1 - r0.x)); r.h = Math.max(0.02, clamp01(r0.h + dy, 1 - r0.y)); }
        return { ...R, [key]: r };
      });
    };
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  }

  if (!open) {
    return (
      <div className="card pad" style={{ marginBottom: 14, background: 'linear-gradient(110deg, var(--bg-surface), rgba(99,102,241,0.07))' }}>
        <div className="row between wrap" style={{ gap: 10 }}>
          <div className="row" style={{ gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: 9, background: 'var(--indigo-500)', display: 'grid', placeItems: 'center', color: '#fff' }}><Icon name="bolt" size={19} /></div>
            <div className="col"><b style={{ fontSize: 14 }}>🎥 라이브 캡처 <span className="chip" style={{ height: 17, fontSize: 9.5 }}>BETA</span></b><span className="muted" style={{ fontSize: 11.5 }}>게임 화면을 공유하면 골드·체력·레벨을 자동으로 읽어 코치에 입력합니다.</span></div>
          </div>
          <button className="btn" onClick={() => setOpen(true)}><Icon name="bolt" size={15} />연결하기</button>
        </div>
      </div>
    );
  }

  return (
    <div className="card pad" style={{ marginBottom: 14 }}>
      <div className="row between" style={{ marginBottom: 10 }}>
        <b style={{ fontSize: 14 }}>🎥 라이브 캡처 <span className="chip" style={{ height: 17, fontSize: 9.5 }}>BETA</span></b>
        <div className="row" style={{ gap: 8 }}>
          {!stream && <button className="btn sm" onClick={connect}><Icon name="bolt" size={14} />게임 화면 연결</button>}
          {stream && !running && <button className="btn sm" onClick={start}><Icon name="refresh" size={14} />읽기 시작</button>}
          {stream && running && <button className="btn ghost sm" onClick={stop}>일시정지</button>}
          {stream && <button className="btn ghost sm" onClick={() => setRegions(DEFAULT_REGIONS)}>박스 초기화</button>}
          <button className="btn ghost sm" onClick={() => { teardown(); setOpen(false); }}><Icon name="x" size={14} /></button>
        </div>
      </div>

      {!stream ? (
        <div className="empty" style={{ padding: '26px 16px' }}>
          <div className="ico"><Icon name="bolt" size={26} /></div>
          <div style={{ fontWeight: 700, color: 'var(--text-secondary)' }}>게임 화면(또는 TFT 창)을 공유하세요</div>
          <div style={{ fontSize: 12, marginTop: 6, maxWidth: 460 }}>[게임 화면 연결] → 공유할 창 선택. localhost(npm run dev)에서만 동작하며, 화면을 읽기만 하고 조작하지 않습니다(조언 전용).</div>
        </div>
      ) : (
        <div className="grid" style={{ gap: 10 }}>
          <div ref={boxWrapRef} style={{ position: 'relative', width: '100%', borderRadius: 10, overflow: 'hidden', background: '#000', lineHeight: 0 }}>
            <video ref={videoRef} muted playsInline style={{ width: '100%', display: 'block', maxHeight: 380, objectFit: 'contain' }} />
            {['gold', 'hp', 'level'].map((key) => { const r = regions[key]; return (
              <div key={key} onPointerDown={(e) => dragRegion(key, e, 'move')}
                style={{ position: 'absolute', left: r.x * 100 + '%', top: r.y * 100 + '%', width: r.w * 100 + '%', height: r.h * 100 + '%', border: `2px solid ${r.color}`, boxShadow: '0 0 0 1px rgba(0,0,0,.6)', cursor: 'move', borderRadius: 3 }}>
                <span style={{ position: 'absolute', top: -16, left: -2, fontSize: 10, fontWeight: 800, color: r.color, textShadow: '0 1px 2px #000', whiteSpace: 'nowrap' }}>{r.label}{vals[key] != null ? ` ${vals[key]}` : ''}</span>
                <div onPointerDown={(e) => dragRegion(key, e, 'resize')} style={{ position: 'absolute', right: -5, bottom: -5, width: 11, height: 11, background: r.color, borderRadius: 2, cursor: 'nwse-resize' }} />
              </div>

          </div>
          <div className="row between wrap" style={{ gap: 8 }}>
            <div className="row" style={{ gap: 8 }}>
              {['level', 'gold', 'hp'].map((k) => <span key={k} className="chip" style={{ borderColor: regions[k].color + '88' }}>{regions[k].label}: <b style={{ marginLeft: 4, color: vals[k] != null ? regions[k].color : 'var(--text-muted)' }}>{vals[k] != null ? vals[k] : '—'}</b></span>)}

            </div>
          </div>
          {status && <div className="muted" style={{ fontSize: 11.5 }}>{status}</div>}
          <div className="why" style={{ fontSize: 11.5 }}>박스를 각 숫자(레벨/골드/체력) 위로 드래그하고 모서리로 크기를 맞추세요. 한 번 맞추면 저장됩니다. 인식이 흔들리면 박스를 숫자에 더 타이트하게.</div>
        </div>
      )}
    </div>
  );
}

/* convert AI diagnosis JSON → the report shape the UI already renders */
function aiToReport(diag, base) {
  const sevType = { high: '핵심', med: '주의', low: '참고' };
  const leaks = (diag.leaks || []).map((l) => ({ type: sevType[l.severity] || '진단', title: l.title, severity: l.severity || 'med', placementCost: l.placementCost != null ? l.placementCost : 0.5, evidence: l.evidence, fix: l.fix, drill: l.drill }));
  return {
    leaks: leaks.length ? leaks : base.leaks,
    lost: (diag.lost || []).map((x, i) => ({ matchId: 'ai' + i, placement: x.placement, comp: x.comp, turningRound: '', what: x.what })),
    summary: { ...base.summary, topLeak: leaks[0] || base.summary.topLeak, totalCost: +(leaks.reduce((a, l) => a + (l.placementCost || 0), 0)).toFixed(1) },
    overall: diag.overall, strength: diag.strength, ai: true,
  };
}

function ProfilePage() {
  const { parts } = useRouter();
  const region = parts[1] || 'kr';
  const riotId = parts[2] ? decodeURIComponent(parts[2]) : '';
  return <div className="page">{riotId ? <ProfileView region={region} riotId={riotId} /> : <ProfileSearch />}</div>;

const QUEUE_LABEL = { ranked: '솔로 랭크', doubleup: '더블 업', turbo: '터보' };
function viewForQueue(praw, queue) {
  const all = praw.matches || [];
  const qms = all.filter((m) => (m.queue || 'ranked') === queue);
  const matches = qms.length ? qms : ((queue === 'ranked' && !praw.real) ? all : qms);
  const qr = (praw.queues && praw.queues[queue]) || (queue === 'ranked' ? { tier: praw.rank, lp: praw.lp } : null);
  const games = matches.length;
  const avg = games ? matches.reduce((a, m) => a + m.placement, 0) / games : (praw.avgPlacement || 4.5);
  const top4 = games ? matches.filter((m) => m.placement <= 4).length / games * 100 : 0;
  const win = games ? matches.filter((m) => m.placement === 1).length / games * 100 : 0;
  const byComp = {}; matches.forEach((m) => { (byComp[m.comp] = byComp[m.comp] || []).push(m.placement); });
  const mastery = Object.entries(byComp).map(([c, v]) => ({ comp: c, games: v.length, avg: v.reduce((a, b) => a + b, 0) / v.length })).sort((a, b) => a.avg - b.avg).slice(0, 6);
  let cur = qr ? qr.lp : 0; const lpHistory = [cur];
  matches.slice().reverse().forEach((m) => { cur = Math.max(0, cur + (m.lp != null ? m.lp : (m.placement <= 4 ? (5 - m.placement) * 8 : -(m.placement - 4) * 9))); lpHistory.push(cur); });
  const view = { ...praw, rank: qr ? qr.tier : 'Unranked', lp: qr ? qr.lp : 0, matches, games, avgPlacement: avg, top4, winRate: win, mastery, lpHistory: lpHistory.length > 1 ? lpHistory : [qr ? qr.lp : 0, qr ? qr.lp : 0] };
  view.report = analyzeProfile(view);
  return view;
}

/* ============================================================

   ============================================================ */
const LB_REGIONS = [{ v: 'kr', label: 'KR' }, { v: 'na', label: 'NA' }, { v: 'euw', label: 'EUW' }];
const LB_TIERS = ['Challenger', 'Grandmaster', 'Master'];
const LB_NAMES_KR = ['김롤체', '우주최강', '아기사자', '정석장인', '리롤본능', '순방요정', '8렙직행', '연승가도', '템포왕', '고점원툴', '저점방어', '겜창', '롤체신', '판수왕', '증강장인'];

function genLeaderboard(region) {
  const seed = 'lb' + region;
  const rows = [];
  for (let i = 0; i < 50; i++) {
    const base = LB_NAMES_KR[i % LB_NAMES_KR.length];
    const name = base + (i < LB_NAMES_KR.length ? '' : Math.floor(i / LB_NAMES_KR.length + 1));
    const lp = Math.round(1600 - i * rand(seed + 'lp' + i, 14, 30));
    const tier = i === 0 ? 'Challenger' : i < 30 ? (i < 12 ? 'Challenger' : 'Grandmaster') : 'Master';
    const fav = [pick(seed + 'f1' + i, COMPS.slice(0, 8)), pick(seed + 'f2' + i, COMPS.slice(0, 12))];
    rows.push({
      rank: i + 1, name, tag: region.toUpperCase() + (1 + (i % 9)),
      tier, lp, avg: rand(seed + 'a' + i, 3.4, 4.4), top4: rand(seed + 't' + i, 55, 72),
      games: Math.round(rand(seed + 'g' + i, 120, 900)), fav: fav.filter((v, idx, a) => a.indexOf(v) === idx),
    });
  }
  return rows;
}

function tierKr(t) { return t === 'Challenger' ? '챌린저' : t === 'Grandmaster' ? '그마' : t === 'Master' ? '마스터' : t; }

/* ============================================================

function traitMembers(name) { return RAW.champions.filter((c) => (c.traits || []).includes(name)).sort((a, b) => a.cost - b.cost); }

function TraitsPage() {
  const [sel, setSel] = useState(null);
  const [q, setQ] = useState('');
  const list = useMemo(() => {
    // dedupe multi-variant traits (별돌보미 별자리) into ONE card — keep the richest breakpoints
    const byName = {};
    RAW.traits.forEach((t) => {
      const ex = byName[t.name];
      if (!ex || (t.breakpoints || []).length > (ex.breakpoints || []).length) byName[t.name] = t;
    });
    return Object.values(byName)
      .map((t) => ({ ...t, members: traitMembers(t.name) }))
      .filter((t) => t.members.length > 0 && (!q || t.name.includes(q)))
      .sort((a, b) => b.members.length - a.members.length);
  }, [q]);

  return (
    <div className="page">
      <PageHead title="특성 (시너지)" sub={`세트 17 특성 ${list.length}종 · 활성화 단계(브레이크포인트)와 보유 챔피언 한눈에`}
        right={<div className="search" style={{ maxWidth: 200 }}><Icon name="search" size={15} className="ico" /><input value={q} placeholder="특성 검색" onChange={(e) => setQ(e.target.value)} /></div>} />
      <DataNote extra="단계별 효과는 라이엇 공식 데이터" />
      <div className="grid" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(330px, 1fr))', gap: 14 }}>
        {list.map((t) => (
          <div key={t.apiName} className="card pad hover fade-in" style={{ cursor: 'pointer' }} onClick={() => setSel(t)}>
            <div className="row between" style={{ marginBottom: 10 }}>
              <div className="row" style={{ gap: 9 }}>
                {t.img ? <img src={t.img} alt="" style={{ width: 26, height: 26 }} onError={(e) => { e.target.style.display = 'none'; }} /> : <Icon name="augments" size={20} style={{ color: 'var(--indigo-400)' }} />}
                <b style={{ fontSize: 14.5 }}>{t.name}</b>
              </div>
              <span className="chip">{t.members.length}챔피언</span>
            </div>
            {t.breakpoints && t.breakpoints.length > 0 && (
              <div className="row wrap" style={{ gap: 6, marginBottom: 10 }}>
                {t.breakpoints.map((bp, i) => {
                  const st = TRAIT_STYLE[bp.style] || TRAIT_STYLE[1];
                  return <span key={i} className="chip" style={{ height: 22, color: st.c, borderColor: st.c + '55' }}>{bp.units}</span>;
                })}
              </div>
            )}
            <div className="row wrap" style={{ gap: 4 }}>
              {t.members.map((m) => <ChampIcon key={m.key} champ={m} size={34} />)}
            </div>
          </div>
        ))}
      </div>

      <Modal open={!!sel} onClose={() => setSel(null)} title={sel && sel.name}>
        {sel && <TraitDetail trait={sel} />}
      </Modal>
    </div>
  );
}

/* per-breakpoint effect list (one constellation / single trait) */
function TraitStages({ breakpoints, rows, note }) {
  const rowFor = (u) => rows ? rows.find((r) => r.units === u) : null;
  return (
    <Card title="단계별 효과" icon="augments">
      {(() => { const maxRow = (rows && rows.length) ? Math.max(...rows.map((r) => r.units)) : 0; return (breakpoints || []).map((bp, i) => {
        const st = TRAIT_STYLE[bp.style] || TRAIT_STYLE[1];
        const row = rowFor(bp.units);
        const prism = bp.style >= 6 || bp.units >= 11;
        const fallback = prism
          ? '프리즘 — 앞 단계 효과 전부 + 강화 칸이 최대로 드러남 (최고 단계)'
          : (bp.units > maxRow ? '앞 단계 효과 유지 + 강화 칸이 더 드러나 더 많은 유닛에 적용' : '능력치 강화');
        return <div key={i} className="row" style={{ gap: 10, padding: '9px 0', borderBottom: i < breakpoints.length - 1 ? '1px solid var(--border)' : 0, alignItems: 'flex-start' }}>
          <span className="tier" style={{ background: st.c, color: '#0b0f1a', minWidth: 30, flexShrink: 0 }}>{bp.units}</span>
          <div className="col" style={{ gap: 2, minWidth: 0 }}>
            {row && row.text
              ? <span style={{ fontSize: 13, color: 'var(--text-primary)', lineHeight: 1.55 }}>{row.text}</span>
              : <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{fallback}</span>}
            <span className="muted" style={{ fontSize: 10.5 }}>{prism ? '프리즘' : st.n} 단계</span>
          </div>
        </div>;
      }); })()}
      {note && <div className="why" style={{ fontSize: 11.5, marginTop: 10 }}>{note}</div>}
    </Card>
  );
}

function TraitDetail({ trait }) {
  const { navigate } = useRouter();

/* ============================================================
   50-liveoverlay — real-time combat win% (beta)
   Screen capture -> read your 28-hex board (icon NCC classify)
   -> combatSim -> win% in a Picture-in-Picture overlay window.
   Honest: 3D-model↔2D-icon matching is imperfect; detected board
   is shown & editable (click to remove) so you can confirm fast.
   ============================================================ */
const ATLAS_N = 24; // canonical grayscale size

function grayNorm(ctx, w, h) {
  const d = ctx.getImageData(0, 0, w, h).data; const g = new Float32Array(w * h);
  for (let i = 0, j = 0; i < d.length; i += 4, j++) g[j] = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
  let mean = 0; for (let k = 0; k < g.length; k++) mean += g[k]; mean /= g.length;
  let norm = 0; for (let k = 0; k < g.length; k++) { g[k] -= mean; norm += g[k] * g[k]; }
  return { g, norm: Math.sqrt(norm) || 1, variance: norm / g.length };
}
function ncc(a, b) { let dot = 0; const ag = a.g, bg = b.g, n = ag.length; for (let k = 0; k < n; k++) dot += ag[k] * bg[k]; return dot / (a.norm * b.norm); }

let _atlasPromise = null;
function buildAtlas(onProgress) {
  if (_atlasPromise) return _atlasPromise;
  const champs = RAW.champions.filter((c) => c.img && c.img.square);
  const cv = document.createElement('canvas'); cv.width = ATLAS_N; cv.height = ATLAS_N; const ctx = cv.getContext('2d', { willReadFrequently: true });
  let done = 0;
  _atlasPromise = Promise.all(champs.map((c) => new Promise((res) => {
    const im = new Image(); im.crossOrigin = 'anonymous';
    im.onload = () => { try { ctx.clearRect(0, 0, ATLAS_N, ATLAS_N); ctx.drawImage(im, im.width * 0.12, im.height * 0.05, im.width * 0.76, im.height * 0.76, 0, 0, ATLAS_N, ATLAS_N); const buf = grayNorm(ctx, ATLAS_N, ATLAS_N); res({ champ: c, buf }); } catch (e) { res(null); } finally { done++; onProgress && onProgress(done, champs.length); } };
    im.onerror = () => { done++; onProgress && onProgress(done, champs.length); res(null); };
    im.src = c.img.square;
  }))).then((a) => a.filter(Boolean));
  return _atlasPromise;
}

const HEX_ROWS = 4, HEX_COLS = 7;
function classifyCell(ctx, atlas) {
  const buf = grayNorm(ctx, ATLAS_N, ATLAS_N);
  if (buf.variance < 80) return null; // empty hex (low texture)
  let best = null, bestScore = -2;
  for (const a of atlas) { const s = ncc(buf, a.buf); if (s > bestScore) { bestScore = s; best = a.champ; } }
  return bestScore >= 0.34 ? { champ: best, score: bestScore } : null;
}

function LiveOverlay() {
  const [open, setOpen] = useState(false);
  const [stream, setStream] = useState(null);
  const [atlasState, setAtlasState] = useState({ ready: false, n: 0, total: 0 });
  const [rect, setRect] = useState(() => store.get('boardRect', { x: 0.28, y: 0.42, w: 0.44, h: 0.42 }));
  const [board, setBoard] = useState([]);     // [{champ, star, score, idx}]
  const [stage, setStage] = useState('4-2');
  const [sim, setSim] = useState(null);
  const [auto, setAuto] = useState(false);
  const [status, setStatus] = useState('');
  const [shopRect, setShopRect] = useState(() => store.get('shopRect', { x: 0.30, y: 0.88, w: 0.52, h: 0.10 }));
  const [shop, setShop] = useState([]);          // [{champ}|null] x5
  const [rec, setRec] = useState(null);          // liveRecommend result
  const [gold, setGold] = useState(50); const [lvl, setLvl] = useState(7); const [hp, setHp] = useState(70);
  const [ai, setAi] = useState(null); const [aiLoading, setAiLoading] = useState(false); const [autoAI, setAutoAI] = useState(false);
  const autoAIRef = useRef(autoAI); autoAIRef.current = autoAI;
  const lastAiKeyRef = useRef(''); // 스테이지/레벨 바뀔 때만 자동 AI (예산 보호)
  const videoRef = useRef(null); const wrapRef = useRef(null);
  const atlasRef = useRef(null); const timerRef = useRef(null); const pipRef = useRef(null);
  const rectRef = useRef(rect); rectRef.current = rect;
  const shopRectRef = useRef(shopRect); shopRectRef.current = shopRect;
  const ctxRef = useRef({ gold, lvl, hp, stage }); ctxRef.current = { gold, lvl, hp, stage };
  useEffect(() => { store.set('shopRect', shopRect); }, [shopRect]);
  useEffect(() => { if (atlasRef.current && (board.length || shop.some(Boolean))) compute(board, shop); /* eslint-disable-next-line */ }, [gold, lvl, hp, stage]);

  useEffect(() => { store.set('boardRect', rect); }, [rect]);
  useEffect(() => () => teardown(), []);
  useEffect(() => { if (stream && videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play().catch(() => {}); } }, [stream]);

  function teardown() { if (timerRef.current) clearInterval(timerRef.current); if (pipRef.current) { try { pipRef.current.close(); } catch (e) {} } setStream((s) => { if (s) s.getTracks().forEach((t) => t.stop()); return null; }); }

  async function connect() {
    if (!navigator.mediaDevices?.getDisplayMedia) { setStatus('이 환경은 화면 공유를 지원하지 않아요 (npm run dev / localhost 필요).'); return; }
    try {
      const s = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 10 }, audio: false });
      s.getVideoTracks()[0].addEventListener('ended', () => teardown());
      setStream(s); setStatus('화면 연결됨. 빨간 박스를 내 8x4 보드 영역에 맞추고 [승률 읽기].');
      if (!atlasRef.current) { setStatus('챔피언 인식 데이터 로딩 중…'); const a = await buildAtlas((n, t) => setAtlasState({ ready: false, n, total: t })); atlasRef.current = a; setAtlasState({ ready: true, n: a.length, total: a.length }); setStatus('준비 완료. 박스를 보드에 맞추고 [승률 읽기].'); }
    } catch (e) { setStatus('화면 공유가 취소됐어요.'); }
  }

  function sampleCells() {
    const v = videoRef.current, atlas = atlasRef.current; if (!v || !v.videoWidth || !atlas) return [];
    const R = rectRef.current; const VW = v.videoWidth, VH = v.videoHeight;
    const bx = R.x * VW, by = R.y * VH, bw = R.w * VW, bh = R.h * VH;
    const cellW = bw / HEX_COLS, cellH = bh / HEX_ROWS;
    const cv = document.createElement('canvas'); cv.width = ATLAS_N; cv.height = ATLAS_N; const ctx = cv.getContext('2d', { willReadFrequently: true });
    const out = [];
    for (let row = 0; row < HEX_ROWS; row++) {
      const stagger = (row % 2 === 1) ? cellW * 0.5 : 0;
      for (let col = 0; col < HEX_COLS; col++) {
        const cx = bx + stagger + col * cellW + cellW * 0.5;
        const cy = by + row * cellH + cellH * 0.5;
        const cropW = cellW * 0.62, cropH = cellH * 0.62;
        const sx = cx - cropW / 2, sy = cy - cropH / 2 - cellH * 0.12; // model renders slightly above hex
        if (sx < 0 || sy < 0 || sx + cropW > VW || sy + cropH > VH) continue;
        ctx.clearRect(0, 0, ATLAS_N, ATLAS_N);
        try { ctx.drawImage(v, sx, sy, cropW, cropH, 0, 0, ATLAS_N, ATLAS_N); } catch (e) { continue; }
        const m = classifyCell(ctx, atlas);
        if (m) out.push({ champ: m.champ, star: 2, score: m.score, idx: row * HEX_COLS + col, row });
      }
    }
    // dedupe same champ (keep best score)
    const byKey = {}; out.forEach((u) => { if (!byKey[u.champ.key] || u.score > byKey[u.champ.key].score) byKey[u.champ.key] = u; });
    return Object.values(byKey).slice(0, 10);
  }

  function sampleShop() {
    const v = videoRef.current, atlas = atlasRef.current; if (!v || !v.videoWidth || !atlas) return [];
    const R = shopRectRef.current; const VW = v.videoWidth, VH = v.videoHeight;
    const bx = R.x * VW, by = R.y * VH, bw = R.w * VW, bh = R.h * VH; const slotW = bw / 5;
    const cv = document.createElement('canvas'); cv.width = ATLAS_N; cv.height = ATLAS_N; const ctx = cv.getContext('2d', { willReadFrequently: true });
    const out = [];
    for (let i = 0; i < 5; i++) {
      const cx = bx + i * slotW + slotW * 0.5, cy = by + bh * 0.45;
      const cropW = slotW * 0.6, cropH = bh * 0.66, sx = cx - cropW / 2, sy = cy - cropH / 2;
      if (sx < 0 || sy < 0 || sx + cropW > VW || sy + cropH > VH) { out.push(null); continue; }
      ctx.clearRect(0, 0, ATLAS_N, ATLAS_N);
      try { ctx.drawImage(v, sx, sy, cropW, cropH, 0, 0, ATLAS_N, ATLAS_N); } catch (e) { out.push(null); continue; }
      const m = classifyCell(ctx, atlas);
      out.push(m ? { champ: m.champ, score: m.score } : null);
    }
    return out;
  }

  function compute(detected, shopDet) {
    const ctx = ctxRef.current;
    const r = liveRecommend({
      board: detected.map((u) => ({ champ: u.champ, star: u.star, row: u.row })),
      shop: shopDet.map((s) => (s ? { champ: s.champ } : null)),
      gold: ctx.gold, level: ctx.lvl, hp: ctx.hp, stage: ctx.stage,
    });
    setRec(r); setSim({ winVsAvg: r.winVsAvg, expectedPlacement: r.expectedPlacement });

    // 라이브 채널로 상태/추천 푸시 → 폰·PC뷰어 실시간 동기화. 스테이지/레벨 바뀌면 자동 AI 1회.
    const key = ctx.stage + '@' + ctx.lvl;
    const autoFire = autoAIRef.current && key !== lastAiKeyRef.current;
    if (autoFire) lastAiKeyRef.current = key;
    pushLive(r, detected, autoFire);
  }
  // /api/live 로 현재 상태+추천을 push. requestAI=true면 서버가 AI 코멘트 생성해 돌려줌(폰에도 공유됨).
  function pushLive(r, detected, requestAI) {
    if (typeof fetch === 'undefined') return;
    const ctx = ctxRef.current;
    const traits = activeTraits(detected.map((u) => u.champ)).filter((t) => t.on).map((t) => `${t.name} ${t.count}`);
    const state = {
      stage: ctx.stage, level: ctx.lvl, gold: ctx.gold, hp: ctx.hp,
      board: detected.map((u) => u.champ.name),
      traits, winRate: r ? r.winVsAvg : null,
      nextMove: r ? (r.top.type === 'buy' ? '구매: ' : '') + r.top.text : null,
    };
    const rec = r ? { top4: r.top4Est, win: r.winVsAvg, place: +r.expectedPlacement.toFixed(1), move: r.top.text, why: r.top.why, macro: r.macro && r.macro.action } : null;
    if (requestAI) setAiLoading(true);
    apiFetch('/api/live', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ state, rec, requestAI }) })
      .then((res) => (res.ok ? res.json() : null)).then((j) => {
        if (j && j.ai) { setAi({ ...j.ai, model: j.model }); }
        else if (requestAI && j && j.aiErr) { setAi({ _err: j.aiErr }); }
      }).catch(() => {}).finally(() => { if (requestAI) setAiLoading(false); });
  }
  function askAI() { if (!rec) { setStatus('먼저 [승률 읽기]로 보드를 인식하세요.'); return; } pushLive(rec, board, true); }
  function readNow() {
    const detected = sampleCells(); setBoard(detected);
    const shopDet = sampleShop(); setShop(shopDet);
    compute(detected, shopDet);
    const shopN = shopDet.filter(Boolean).length;
    setStatus(detected.length ? `보드 ${detected.length}기 · 상점 ${shopN}칸 인식 — 순방 추천 계산됨 (오인식은 보드에서 클릭 제거)` : '인식 실패 — 박스를 보드/상점에 더 정확히 맞춰보세요.');
  }
  function removeUnit(key) { setBoard((b) => { const nb = b.filter((u) => u.champ.key !== key); compute(nb, shop); return nb; }); }

  function start() { if (auto) return; setAuto(true); readNow(); timerRef.current = setInterval(readNow, 2500); }
  function stop() { setAuto(false); if (timerRef.current) clearInterval(timerRef.current); }

  async function openPip() {
    if (!window.documentPictureInPicture) { setStatus('이 브라우저는 PiP 오버레이 창을 지원하지 않아요 (Chrome/Edge 최신 권장). 아래 패널로 표시됩니다.'); return; }
    try {
      const w = await window.documentPictureInPicture.requestWindow({ width: 260, height: 210 });
      pipRef.current = w;
      w.document.body.style.cssText = 'margin:0;font-family:Pretendard,sans-serif;background:#0B0F1A;color:#E8ECF4;';
      w.document.body.innerHTML = '<div style="padding:13px"><div style="font-size:10.5px;color:#9AA5BC">차원전술 · 라이브</div><div style="display:flex;align-items:baseline;gap:8px;margin:4px 0"><span style="font-size:11px;color:#9AA5BC">순방확률</span><span id="pt4" style="font-size:34px;font-weight:800">--%</span></div><div style="height:9px;border-radius:6px;background:#1B2233;overflow:hidden"><div id="pb" style="height:100%;width:0;background:#34D399"></div></div><div style="margin-top:10px;font-size:10.5px;color:#9AA5BC">추천</div><div id="ptop" style="font-size:14px;font-weight:700;line-height:1.3;margin-top:2px">—</div><div id="pwhy" style="font-size:10.5px;color:#5E6A85;margin-top:3px"></div><div id="ps" style="font-size:10.5px;color:#5E6A85;margin-top:8px"></div></div>';
      if (rec) updatePip(rec, board.length);
    } catch (e) { setStatus('PiP 창을 열 수 없어요: ' + (e.message || e)); }
  }
  function updatePip(r, n) {
    const w = pipRef.current; if (!w || w.closed) return; const d = w.document; const g = (id) => d.getElementById(id);
    if (!g('pt4')) return;
    const col = r.top4Est >= 60 ? '#34D399' : r.top4Est >= 45 ? '#FBBF24' : '#F87171';
    g('pt4').textContent = r.top4Est + '%'; g('pt4').style.color = col;
    g('pb').style.width = r.top4Est + '%'; g('pb').style.background = col;
    g('ptop').textContent = (r.top.type === 'buy' ? '🛒 ' : '⚡ ') + r.top.text;
    g('pwhy').textContent = r.top.why || '';
    g('ps').textContent = `전투승률 ${r.winVsAvg}% · 예상 ${r.expectedPlacement.toFixed(1)}등 · ${n}기 · ${ctxRef.current.stage}`;
  }

  function dragBox(which, e, mode) {
    e.preventDefault(); e.stopPropagation();
    const wrap = wrapRef.current; if (!wrap) return; const wr = wrap.getBoundingClientRect();
    const setter = which === 'shop' ? setShopRect : setRect; const r0 = { ...(which === 'shop' ? shopRectRef.current : rectRef.current) }; const px = e.clientX, py = e.clientY;
    const mv = (ev) => { const dx = (ev.clientX - px) / wr.width, dy = (ev.clientY - py) / wr.height; setter((R) => { const n = { ...R }; if (mode === 'move') { n.x = Math.max(0, Math.min(1 - n.w, r0.x + dx)); n.y = Math.max(0, Math.min(1 - n.h, r0.y + dy)); } else { n.w = Math.max(0.1, Math.min(1 - r0.x, r0.w + dx)); n.h = Math.max(0.05, Math.min(1 - r0.y, r0.h + dy)); } return n; }); };

    <div className="card pad" style={{ marginBottom: 14 }}>

        <b style={{ fontSize: 14 }}>🎯 라이브 전투 승률 <span className="chip" style={{ height: 17, fontSize: 9.5 }}>BETA</span></b>
        <div className="row wrap" style={{ gap: 8 }}>
          {!stream && <button className="btn sm" onClick={connect}><Icon name="bolt" size={14} />게임 화면 연결</button>}

          {stream && !auto && <button className="btn ghost sm" onClick={start}>자동(2.5초)</button>}
          {stream && auto && <button className="btn ghost sm" onClick={stop}>자동 정지</button>}

          <div className="why" style={{ fontSize: 11.5 }}>전투 시작 직전/직후 [승률 읽기](또는 자동)를 누르면 화면의 내 보드를 인식해 평균 로비 대비 승률을 계산합니다. [AI 코멘트]로 그때그때 동적 진단을, [오버레이 창]으로 PiP를 띄워 게임 옆에 두세요. 폰으로 보려면 같은 와이파이에서 <b>/live</b> 페이지를 여세요. 3D 모델↔아이콘 매칭이라 인식이 완벽하진 않으니 감지 보드를 한 번 확인하세요.</div>
          <div className="why" style={{ fontSize: 11, borderLeftColor: 'var(--warn)', color: 'var(--text-secondary)' }}><b style={{ color: 'var(--warn)' }}>안전</b> — 이 기능은 브라우저 화면공유(getDisplayMedia)로 <b>화면 픽셀만</b> 읽습니다. 게임 메모리·프로세스는 전혀 건드리지 않고(=뱅가드 탐지 대상 아님), 입력 자동화도 없는 <b>조언 전용</b>입니다. 다만 실시간 보조도구는 Riot 약관상 회색지대이니, 계정이 우려되면 <b>수동 입력 코치</b>나 <b>게임 후 복기</b>로 쓰세요.</div>
        </div>
      )}
    </div>
  );
}


/* ===================== 51-live.jsx ===================== */
/* ============================================================
   51-live — 라이브 세컨스크린 뷰어 (폰/세컨모니터)
   PC(코치 화면)가 게임 화면을 인식해 /api/live 로 푸시한 상태+AI 코멘트를
   여기서 폴링해 크게 보여준다. 폰을 같은 와이파이로 http://PC-IP:5173/#/live 접속.
   ============================================================ */
function LivePage() {
  const [live, setLive] = useState(null);
  const [err, setErr] = useState(false);
  const [ageMin, setAgeMin] = useState(0);

  useEffect(() => {
    let alive = true;
    const tick = () => {
      if (typeof fetch === 'undefined') { setErr(true); return; }
      apiFetch('/api/live', { cache: 'no-store' })
        .then((r) => (r.ok ? r.json() : null))
        .then((j) => { if (!alive) return; if (j) { setLive(j); setErr(false); } else setErr(true); })
        .catch(() => { if (alive) setErr(true); });
    };
    tick();
    const id = setInterval(tick, 2000);
    return () => { alive = false; clearInterval(id); };
  }, []);

  useEffect(() => {
    const id = setInterval(() => { if (live && live.ts) setAgeMin(Math.round((Date.now() - live.ts) / 1000)); }, 1000);
    return () => clearInterval(id);
  }, [live]);

  const s = live && live.state;
  const rec = live && live.rec;
  const ai = live && live.ai;
  const hasSession = !!(s && live.seq > 0);

  return (
    <div className="page live-page">
      <div className="row between" style={{ marginBottom: 12, alignItems: 'center' }}>
        <div className="row" style={{ gap: 8, alignItems: 'center' }}>
          <span className={cx('live-dot', !hasSession && 'off')} />
          <b style={{ fontSize: 16 }}>라이브 세컨스크린</b>
        </div>
        <span className="muted" style={{ fontSize: 11 }}>{err ? '서버 대기' : hasSession ? `갱신 ${ageMin}s 전` : '세션 대기'}</span>
      </div>

      {!hasSession ? (
        <Card>
          <div className="empty" style={{ padding: '30px 16px' }}>
            <div className="ico"><Icon name="target" size={28} /></div>
            <div style={{ fontWeight: 700, color: 'var(--text-secondary)' }}>아직 라이브 세션이 없어요</div>
            <div style={{ fontSize: 12.5, marginTop: 8, lineHeight: 1.6, maxWidth: 420, margin: '8px auto 0' }}>
              게임하는 <b>PC에서</b> 코치 화면(<Link to="/coach" style={{ color: 'var(--indigo-300)', fontWeight: 700 }}>/coach</Link>)을 열고 <b>라이브 전투 승률 오버레이 → 게임 화면 연결</b>을 켜면,
              여기(폰/세컨모니터)에 실시간 보드·승률·AI 코멘트가 자동으로 뜹니다.
            </div>
          </div>
        </Card>
      ) : (
        <div className="grid" style={{ gap: 12 }}>
          {/* 핵심: 다음 한 수 (AI 우선, 없으면 규칙) */}
          <Card pad>
            <div className="row" style={{ gap: 10, alignItems: 'center', marginBottom: 6 }}>
              <div style={{ width: 42, height: 42, borderRadius: 11, background: 'var(--indigo-500)', display: 'grid', placeItems: 'center', color: '#fff', flex: '0 0 auto' }}><Icon name="bolt" size={22} /></div>
              <div className="col">
                <span className="muted" style={{ fontSize: 11, fontWeight: 700 }}>{ai && ai.move ? `AI 다음 한 수 ${live.model ? '· ' + live.model : ''}` : '다음 한 수 (규칙)'}</span>
                <b style={{ fontSize: 19, lineHeight: 1.25 }}>{(ai && ai.move) || (rec && rec.move) || '—'}</b>
              </div>
            </div>
            {ai && ai.read && <div className="muted" style={{ fontSize: 12.5, fontStyle: 'italic', marginTop: 2 }}>“{ai.read}”</div>}
            {ai && ai.why && <Why label="이유">{ai.why}</Why>}
            {!ai && rec && rec.why && <Why label="이유">{rec.why}</Why>}
            {ai && ai.risk && <div className="why" style={{ borderLeftColor: 'var(--warn)', marginTop: 8 }}><b style={{ color: 'var(--warn)', fontSize: 11 }}>주의</b> <span style={{ fontSize: 12.5 }}>{ai.risk}</span></div>}
            {ai && ai.alt && <div className="why" style={{ borderLeftColor: 'var(--pos)', marginTop: 6 }}><b style={{ color: 'var(--pos)', fontSize: 11 }}>안 풀리면</b> <span style={{ fontSize: 12.5 }}>{ai.alt}</span></div>}
          </Card>

          {/* 상태 + 승률 */}
          <div className="grid cols-2" style={{ gap: 12 }}>
            <Card title="현재 상태" icon="coin">
              <div className="row wrap" style={{ gap: 14 }}>
                <Stat k="스테이지" v={s.stage} />
                <Stat k="레벨" v={s.level} />
                <Stat k="골드" v={s.gold} />
                <Stat k="체력" v={s.hp} />
              </div>
            </Card>
            <Card title="전투 예측" icon="target">
              <div className="row wrap" style={{ gap: 14 }}>
                <Stat k="순방률" v={rec && rec.top4 != null ? rec.top4 + '%' : '—'} c="var(--pos)" />
                <Stat k="전투 승률" v={rec && rec.win != null ? rec.win + '%' : '—'} />
                <Stat k="예상 등수" v={rec && rec.place != null ? rec.place : '—'} />
              </div>
            </Card>
          </div>

          {/* 보드 + 특성 */}
          {s.board && s.board.length > 0 && (
            <Card title={`현재 보드 (${s.board.length})`} icon="champions">
              <div className="row wrap" style={{ gap: 6 }}>
                {s.board.map((nm, i) => { const c = champByName[nm] || champByName[CHAMP_ALIAS && CHAMP_ALIAS[nm]] || null; return c ? <ChampIcon key={i} champ={c} size={40} /> : <span key={i} className="chip">{nm}</span>; })}
              </div>
              {s.traits && s.traits.length > 0 && <div className="row wrap" style={{ gap: 5, marginTop: 10 }}>{s.traits.map((t, i) => <span key={i} className="chip" style={{ height: 20 }}>{t}</span>)}</div>}
            </Card>
          )}

          {rec && rec.macro && <div className="why" style={{ fontSize: 12 }}><span className="why-label">운영</span>{rec.macro}</div>}
        </div>
      )}

      <div className="muted" style={{ fontSize: 10.5, marginTop: 14, lineHeight: 1.6 }}>
        이 화면은 PC가 인식한 상태를 2초마다 받아 표시합니다(읽기 전용). AI 코멘트는 PC에서 [AI 코멘트]/[자동 AI]를 켜야 갱신됩니다.
      </div>
    </div>
  );
}

function Stat({ k, v, c }) {
  return <div className="col"><span className="muted" style={{ fontSize: 10 }}>{k}</span><b className="tnum" style={{ fontSize: 18, color: c || 'var(--text)' }}>{v}</b></div>;
}


/* ===================== 52-patches.jsx ===================== */
/* ============================================================
   52-patches — 패치 노트 (세트 17 패치별 핵심 변경점 드릴다운)
   data: window.TFT_PATCHES (researched 17.1–17.6)
   ============================================================ */
const PATCHES = (typeof window !== 'undefined' && window.TFT_PATCHES) || [];

const DIR_STYLE = {
  '버프': { c: 'var(--pos)', bg: 'var(--pos-soft)', ic: 'up' },
  '너프': { c: 'var(--neg)', bg: 'var(--neg-soft)', ic: 'down' },
  '조정': { c: 'var(--indigo-300)', bg: 'var(--indigo-soft)', ic: 'refresh' },
};
const TYPE_META = {
  '시스템': { ic: 'grid', label: '시스템' },
  '특성': { ic: 'sparkle', label: '특성' },
  '챔피언': { ic: 'champions', label: '챔피언' },
  '아이템': { ic: 'items', label: '아이템' },
  '증강': { ic: 'augments', label: '증강' },
};

function DirBadge({ dir }) {
  const s = DIR_STYLE[dir] || DIR_STYLE['조정'];
  return <span className="chip" style={{ background: s.bg, color: s.c, borderColor: 'transparent', fontWeight: 800, gap: 4, height: 22 }}><Icon name={s.ic} size={11} />{dir}</span>;
}

function PatchChange({ ch }) {
  const tm = TYPE_META[ch.type] || { ic: 'info', label: ch.type };
  const s = DIR_STYLE[ch.dir] || DIR_STYLE['조정'];
  return (
    <div className="row" style={{ gap: 12, padding: '12px 0', borderBottom: '1px solid var(--border)', alignItems: 'flex-start' }}>
      <div style={{ width: 30, height: 30, borderRadius: 8, background: s.bg, color: s.c, display: 'grid', placeItems: 'center', flexShrink: 0 }}><Icon name={tm.ic} size={15} /></div>
      <div className="col" style={{ gap: 5, minWidth: 0, flex: 1 }}>
        <div className="row wrap" style={{ gap: 7, alignItems: 'center' }}>
          <span className="chip" style={{ height: 20, fontSize: 10.5 }}>{tm.label}</span>
          <DirBadge dir={ch.dir} />
          <b style={{ fontSize: 13 }}>{ch.target}</b>
        </div>
        <div style={{ fontSize: 12.5, color: 'var(--text-secondary)', lineHeight: 1.65 }}>{ch.detail}</div>
      </div>
    </div>
  );
}
