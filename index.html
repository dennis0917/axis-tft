  const p = PATCHES[sel];
  const counts = p.changes.reduce((a, c) => { a[c.dir] = (a[c.dir] || 0) + 1; return a; }, {});
  const typeOpts = [{ v: 'all', label: '전체' }].concat(Object.keys(TYPE_META).filter((t) => p.changes.some((c) => c.type === t)).map((t) => ({ v: t, label: TYPE_META[t].label })));
  const changes = p.changes.filter((c) => (type === 'all' || c.type === type) && (dir === 'all' || c.dir === dir));

  return (
    <div className="page">
      <PageHead title="패치 노트" sub="세트 17 패치별 '핵심 변경점만' — 버프/너프/조정으로 드릴다운. 이번 패치가 메타를 어디로 미는지 한눈에." />

      {/* patch timeline selector */}
      <div className="row wrap" style={{ gap: 8, marginBottom: 16 }}>
        {PATCHES.map((pp, i) => (
          <button key={pp.patch} className={cx('chip', i === sel && 'solid')}
            style={{ cursor: 'pointer', height: 34, fontSize: 13, fontWeight: i === sel ? 800 : 600, gap: 6, paddingInline: 12 }}
            onClick={() => { setSel(i); setType('all'); setDir('all'); }}>
            {i === 0 && <span className="live-dot" />}패치 {pp.patch}
          </button>
        ))}
      </div>

      {/* selected patch header */}
      <Card className="fade-in" key={'h' + sel}>
        <div className="row between wrap" style={{ gap: 12, alignItems: 'flex-start' }}>
          <div className="col" style={{ gap: 6, minWidth: 0, flex: 1 }}>
            <div className="row" style={{ gap: 10, alignItems: 'center' }}>
              <span style={{ fontSize: 26, fontWeight: 900, letterSpacing: '-0.02em' }}>패치 {p.patch}</span>
              {sel === 0 && <span className="chip" style={{ background: 'var(--pos-soft)', color: 'var(--pos)', borderColor: 'transparent', fontWeight: 800 }}>현재 패치</span>}
              <span className="muted" style={{ fontSize: 12.5 }}>{p.date}</span>
            </div>
            <div style={{ fontSize: 13.5, color: 'var(--text-secondary)', lineHeight: 1.6 }}>{p.headline}</div>
          </div>
          <div className="row" style={{ gap: 7 }}>
            <span className="chip" style={{ background: 'var(--pos-soft)', color: 'var(--pos)', borderColor: 'transparent', fontWeight: 800, gap: 4 }}><Icon name="up" size={11} />버프 {counts['버프'] || 0}</span>
            <span className="chip" style={{ background: 'var(--neg-soft)', color: 'var(--neg)', borderColor: 'transparent', fontWeight: 800, gap: 4 }}><Icon name="down" size={11} />너프 {counts['너프'] || 0}</span>
            <span className="chip" style={{ background: 'var(--indigo-soft)', color: 'var(--indigo-300)', borderColor: 'transparent', fontWeight: 800, gap: 4 }}><Icon name="refresh" size={11} />조정 {counts['조정'] || 0}</span>
          </div>
        </div>
      </Card>

      {/* key takeaways — 핵심만 */}
      {p.keyTakeaways && p.keyTakeaways.length > 0 && (
        <Card title="핵심 변경 요약" icon="zap" className="fade-in" style={{ marginTop: 14 }} key={'k' + sel}>
          <div className="grid" style={{ gap: 10 }}>
            {p.keyTakeaways.map((t, i) => (
              <div key={i} className="row" style={{ gap: 10, alignItems: 'flex-start' }}>
                <span className="chip solid" style={{ minWidth: 22, height: 22, justifyContent: 'center', flexShrink: 0 }}>{i + 1}</span>
                <span style={{ fontSize: 13, color: 'var(--text-primary)', lineHeight: 1.65 }}>{t}</span>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* drilldown: full change list with filters */}
      <Card title={`변경 내역 (${changes.length}건)`} icon="filter" className="fade-in" style={{ marginTop: 14 }}>
        <div className="row between wrap" style={{ gap: 10, marginBottom: 8 }}>
          <Seg options={typeOpts} value={type} onChange={setType} />
          <Seg options={[{ v: 'all', label: '전체' }, { v: '버프', label: '버프' }, { v: '너프', label: '너프' }, { v: '조정', label: '조정' }]} value={dir} onChange={setDir} />
        </div>
        {changes.length === 0
          ? <div className="muted" style={{ fontSize: 12.5, padding: '12px 0' }}>해당 조건의 변경점이 없어요.</div>
          : changes.map((ch, i) => <PatchChange key={i} ch={ch} />)}
      </Card>
    </div>
  );
}


/* ===================== 53-odds.jsx ===================== */
/* ============================================================
   53-odds — 확률 계산기 (상점 확률표 + 리롤 적중 계산기 + 챔피언 풀)
   data: window.TFT_ODDS = { shopOdds:{lvl:[c1..c5]}, poolSize:{cost:n}, poolChampCount:{cost:n}, maxLevel }
   ============================================================ */
const ODDS = (typeof window !== 'undefined' && window.TFT_ODDS) || null;
const COST_LABEL = [1, 2, 3, 4, 5];

function RollCalculator() {
  const champs = useMemo(() => RAW.champions.filter((c) => c.cost >= 1 && c.cost <= 5).sort((a, b) => a.cost - b.cost || a.name.localeCompare(b.name, 'ko')), []);
  const [key, setKey] = useState(() => (champs.find((c) => c.cost === 4) || champs[0] || {}).key);
  const [level, setLevel] = useState(8);
  const [out, setOut] = useState(0);   // copies of target already taken
  const [gold, setGold] = useState(50);
  const champ = champByKey[key] || champs[0];
  if (!ODDS || !champ) return null;
  const cost = champ.cost;
  const pTier = ((ODDS.shopOdds[level] || ODDS.shopOdds[String(level)] || [])[cost - 1] || 0) / 100;
  const poolPer = ODDS.poolSize[cost] || ODDS.poolSize[String(cost)] || 1;
  const champN = ODDS.poolChampCount[cost] || ODDS.poolChampCount[String(cost)] || 1;
  const poolTotal = poolPer * champN;
  const remainThis = Math.max(0, poolPer - out);
  const denom = Math.max(remainThis, poolTotal - out);
  const pSlot = denom > 0 ? pTier * (remainThis / denom) : 0;
  const pShop = 1 - Math.pow(1 - pSlot, 5);          // ≥1 in one 4g... shop (5 slots)
  const rolls = Math.floor(gold / 2);
  const pGold = 1 - Math.pow(1 - pSlot, 5 * rolls);  // ≥1 across all rolls with this gold
  const expected = 5 * rolls * pSlot;
  const pct = (p) => (p * 100).toFixed(1) + '%';

  return (
    <Card title="리롤 적중 계산기" icon="refresh">
      <div className="muted" style={{ fontSize: 12, marginBottom: 12 }}>특정 기물을 이 레벨에서 굴렸을 때 뜰 확률 — 골드를 넣으면 그 골드로 적어도 1장 뽑을 확률까지.</div>
      <div className="grid cols-2" style={{ gap: 14 }}>
        <div className="col" style={{ gap: 12 }}>
          <div><div className="muted" style={{ fontSize: 11, marginBottom: 5 }}>기물</div>
            <select className="input" style={{ width: '100%' }} value={key} onChange={(e) => setKey(e.target.value)}>
              {champs.map((c) => <option key={c.key} value={c.key}>{c.name} ({c.cost}코)</option>)}
            </select>
          </div>
          <div><div className="muted" style={{ fontSize: 11, marginBottom: 5 }}>레벨</div>
            <Seg options={[4, 5, 6, 7, 8, 9, 10].map((l) => ({ v: l, label: String(l) }))} value={level} onChange={setLevel} /></div>
          <div><div className="muted" style={{ fontSize: 11, marginBottom: 5 }}>이미 빠진 {champ.name} 수 (나+상대)</div>
            <Stepper value={out} min={0} max={poolPer} onChange={setOut} /></div>
          <div><div className="muted" style={{ fontSize: 11, marginBottom: 5 }}>굴릴 골드</div>
            <Stepper value={gold} min={0} max={200} step={2} onChange={setGold} suffix="G" /></div>
        </div>
        <div className="col" style={{ gap: 10 }}>
          <div className="statbox"><div className="k">한 상점(5칸)에 1장 이상</div><div className="v" style={{ color: 'var(--indigo-300)' }}>{pct(pShop)}</div></div>
          <div className="statbox"><div className="k">{gold}골드({rolls}번 굴림)로 1장 이상</div><div className="v" style={{ color: pGold > 0.6 ? 'var(--pos)' : pGold > 0.3 ? 'var(--warn)' : 'var(--neg)' }}>{pct(pGold)}</div></div>
          <div className="row" style={{ gap: 10 }}>
            <div className="statbox" style={{ flex: 1 }}><div className="k">기대 획득 수</div><div className="v">{expected.toFixed(1)}<small> 장</small></div></div>
            <div className="statbox" style={{ flex: 1 }}><div className="k">슬롯당 확률</div><div className="v">{pct(pSlot)}</div></div>
          </div>
          <div className="muted" style={{ fontSize: 11 }}>{champ.name} {cost}코 · {level}렙 {cost}코 등장 {(pTier * 100).toFixed(0)}% · 풀 {poolPer}장×{champN}종 · 남은 {remainThis}장</div>
        </div>
      </div>
      <div className="why" style={{ fontSize: 11.5, marginTop: 12 }}>경합(상대가 같은 기물 빼감)이 심할수록 '이미 빠진 수'를 올려서 계산하세요. 풀이 마르면 확률이 급락합니다. 1번 굴림 = 2골드 = 5칸.</div>
    </Card>
  );
}

function OddsPage() {
  if (!ODDS) return <div className="page"><Empty icon="refresh" title="확률 데이터 준비 중" sub="상점 확률 데이터를 불러오지 못했습니다" /></div>;
  const levels = Object.keys(ODDS.shopOdds).map(Number).sort((a, b) => a - b);
  const costColor = (c) => COST_COLOR[c] || 'var(--text-secondary)';
  return (
    <div className="page">
      <PageHead title="확률 계산기" sub="상점 등장 확률 · 리롤 적중 계산 · 챔피언 풀 — 굴리기 전에 수학으로 확인." />
      <DataNote extra={'패치 ' + (ODDS.patch || '17.6') + ' 기준 상점 확률'} />

      <RollCalculator />

      <div className="grid cols-2" style={{ gap: 16, marginTop: 16 }}>
        <Card title="레벨별 상점 등장 확률" icon="coin">
          <table className="table">
            <thead><tr><th>레벨</th>{COST_LABEL.map((c) => <th key={c} className="num" style={{ color: costColor(c) }}>{c}코</th>)}</tr></thead>
            <tbody>
              {levels.map((l) => { const row = ODDS.shopOdds[l] || ODDS.shopOdds[String(l)]; return (
                <tr key={l}>
                  <td><b className="tnum">{l}</b></td>
                  {COST_LABEL.map((c) => { const v = row[c - 1] || 0; return <td key={c} className="num"><span className="tnum" style={{ color: v > 0 ? costColor(c) : 'var(--text-muted)', fontWeight: v >= 30 ? 800 : 400 }}>{v ? v + '%' : '–'}</span></td>; })}
                </tr>
              ); })}
            </tbody>
          </table>
        </Card>

        <Card title="챔피언 풀 (코스트별)" icon="champions">
          <div className="muted" style={{ fontSize: 12, marginBottom: 10 }}>같은 코스트의 모든 플레이어가 공유하는 풀. 풀이 마르면 경합 기물이 안 뜹니다.</div>
          <table className="table">
            <thead><tr><th>코스트</th><th className="num">기물당 장수</th><th className="num">기물 종류</th><th className="num">총 카드</th></tr></thead>
            <tbody>
              {COST_LABEL.map((c) => { const per = ODDS.poolSize[c] || ODDS.poolSize[String(c)] || 0; const n = ODDS.poolChampCount[c] || ODDS.poolChampCount[String(c)] || 0; return (
                <tr key={c}>
                  <td><span className="tnum" style={{ color: costColor(c), fontWeight: 800 }}>{c}코</span></td>
                  <td className="num"><b className="tnum">{per}</b></td>
                  <td className="num"><span className="tnum">{n}</span></td>
                  <td className="num"><span className="tnum muted">{per * n}</span></td>
                </tr>
              ); })}
            </tbody>
          </table>
          {ODDS.notes && <div className="muted" style={{ fontSize: 11, marginTop: 10 }}>{ODDS.notes}</div>}
        </Card>
      </div>
    </div>
  );
}

/* ============================================================
   90-app — route table, providers, mount
   ============================================================ */
function NotFound() {
  return <div className="page"><Empty icon="search" title="페이지를 찾을 수 없어요" sub="왼쪽 메뉴에서 이동하세요" /></div>;
}

const ROUTES = {
  '': DashboardPage, meta: MetaPage, champions: ChampionsPage, traits: TraitsPage, items: ItemsPage,
  augments: AugmentsPage, trends: TrendsPage, patches: PatchesPage, odds: OddsPage, builder: BuilderPage, coach: CoachPage, live: LivePage, profile: ProfilePage, leaderboard: LeaderboardPage,
};

function Routes() {
  const { parts } = useRouter();
  const Page = ROUTES[parts[0] || ''] || NotFound;
  // per-page boundary: a crash in one page won't blank the shell, and navigating resets it
  return <ErrorBoundary key={parts[0] || 'home'}><Page /></ErrorBoundary>;
}

function App() {
  // Data source via adapter pattern. Default: local mock.
  // To point at a real backend: localStorage.axis_api = "https://api.example.com"
  const apiBase = store.get('api', null);
  const source = apiBase ? ApiDataSource(apiBase) : MockDataSource;
  return (
    <DataSourceProvider source={source}>
      <Router>
        <AppShell><Routes /></AppShell>
      </Router>
    </DataSourceProvider>
  );
}

(function mount() {
  const el = document.getElementById('root');
  const root = ReactDOM.createRoot(el);
  root.render(<App />);
  const sp = document.getElementById('splash');
  if (sp) { sp.style.opacity = '0'; setTimeout(() => sp.remove(), 450); }
})();

/*BUNDLE_END*/</script>

  <!-- loader: wait for libs, transpile (cached), execute -->
  <script>
  (function () {
    function hash(s) { var h = 5381; for (var i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; return h; }
    function showErr(e) {
      var sp = document.getElementById('splash');
      if (sp) sp.innerHTML = '<div style="max-width:540px;text-align:center;color:#9AA5BC;padding:24px;font-family:Pretendard,sans-serif">' +
        '<div style="font-weight:800;color:#E8ECF4;font-size:18px;margin-bottom:10px">로드 중 오류가 났어요</div>' +
        '<div style="font-size:13px;line-height:1.6;white-space:pre-wrap">' + String(e && e.message || e) + '</div>' +
        '<div style="margin-top:16px;font-size:12px">인터넷(CDN) 연결을 확인하고 새로고침 해주세요. (React·Babel을 CDN에서 받습니다)</div>' +
        '<button onclick="location.reload()" style="margin-top:14px;padding:9px 18px;border-radius:8px;border:0;background:#6366F1;color:#fff;font-weight:700;cursor:pointer">새로고침</button></div>';
      console.error(e);
    }
    function start() {
      var src = document.getElementById('appsrc').textContent;
      var key = 'axis_tx_' + hash(src);
      var code = null; try { code = localStorage.getItem(key); } catch (e) {}
      if (!code) {
        code = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        try {
          for (var i = localStorage.length - 1; i >= 0; i--) { var k = localStorage.key(i); if (k && k.indexOf('axis_tx_') === 0 && k !== key) localStorage.removeItem(k); }
          localStorage.setItem(key, code);
        } catch (e) {}
      }
      var s = document.createElement('script'); s.textContent = code; document.body.appendChild(s);
    }
    var tries = 0;
    function ready() {
      if (window.React && window.ReactDOM && window.Babel && window.TFT_RAW) { try { start(); } catch (e) { showErr(e); } }
      else if (tries++ < 200) setTimeout(ready, 50);
      else showErr(new Error('필수 라이브러리 로드 실패 (React/Babel/데이터). CDN 차단 또는 오프라인 상태일 수 있어요.'));
    }
    ready();
  })();
